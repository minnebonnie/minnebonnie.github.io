<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#6b8f71">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="복약일지">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="format-detection" content="telephone=no">

<link rel="apple-touch-icon" sizes="180x180" href="./icon.png">
<link rel="icon" type="image/png" href="./icon.png">
<link rel="shortcut icon" type="image/png" href="./icon.png">

<title>콘서타 복약일지</title>

<style>
:root {
    --bg:#f4f7f1;
    --card:#ffffff;
    --text:#28332b;
    --sub:#879186;
    --border:#dfe8dc;
    --primary:#6b8f71;
    --primary-dark:#426b4a;
    --soft:#edf6ee;
    --cream:#fffdf7;
    --danger:#d96b6b;
    --yellow:#fff2b8;
    --shadow:0 10px 26px rgba(65, 95, 70, 0.12);
}

* {
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body {
    margin:0;
    min-height:100vh;
    background:
        radial-gradient(circle at top left, #e0f6e5 0, transparent 34%),
        radial-gradient(circle at bottom right, #fff4c9 0, transparent 34%),
        var(--bg);
    color:var(--text);
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    padding:14px;
    padding-top:max(14px, env(safe-area-inset-top));
    padding-bottom:max(14px, env(safe-area-inset-bottom));
}

button, input, textarea {
    font-family:inherit;
}

.app {
    max-width:980px;
    margin:0 auto;
}

.header {
    background:rgba(255,255,255,0.88);
    border:1px solid rgba(255,255,255,0.8);
    border-radius:28px;
    padding:18px;
    box-shadow:var(--shadow);
    margin-bottom:14px;
}

.title {
    font-size:1.55rem;
    font-weight:950;
    letter-spacing:-0.05em;
    color:var(--primary-dark);
}

.subtitle {
    margin-top:4px;
    color:var(--sub);
    font-size:0.82rem;
    font-weight:750;
    line-height:1.5;
}

.quick-card {
    background:var(--card);
    border-radius:28px;
    padding:16px;
    box-shadow:var(--shadow);
    border:1px solid var(--border);
    margin-bottom:14px;
}

.input-row {
    display:flex;
    gap:8px;
    align-items:center;
}

#logInput {
    flex:1;
    border:1px solid var(--border);
    border-radius:18px;
    padding:15px 14px;
    font-size:1rem;
    outline:none;
    background:#fbfdfb;
}

.add-btn {
    border:none;
    background:var(--primary);
    color:white;
    border-radius:18px;
    padding:15px 16px;
    font-size:0.95rem;
    font-weight:950;
    cursor:pointer;
    white-space:nowrap;
}

.hint {
    margin-top:9px;
    color:var(--sub);
    font-size:0.74rem;
    font-weight:750;
}

.backup-zone {
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:14px;
}

.btn {
    flex:1;
    min-width:90px;
    border:none;
    border-radius:16px;
    padding:11px 12px;
    background:white;
    color:#4a564b;
    font-size:0.8rem;
    font-weight:900;
    box-shadow:0 4px 12px rgba(65,95,70,0.08);
    border:1px solid var(--border);
    cursor:pointer;
}

.btn.merge {
    background:#eef5ff;
    color:#4770aa;
}

.btn.overwrite {
    background:#fff1ef;
    color:#c65e55;
}

.calendar-card {
    background:var(--card);
    border-radius:28px;
    padding:16px;
    box-shadow:var(--shadow);
    border:1px solid var(--border);
}

.calendar-head {
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-bottom:14px;
}

.month-title {
    font-size:1.25rem;
    font-weight:950;
    color:var(--primary-dark);
    letter-spacing:-0.03em;
}

.navs {
    display:flex;
    gap:7px;
}

.nav-btn {
    width:38px;
    height:38px;
    border:none;
    border-radius:50%;
    background:var(--soft);
    color:var(--primary-dark);
    font-weight:950;
    cursor:pointer;
}

.weekdays {
    display:grid;
    grid-template-columns:repeat(7, 1fr);
    gap:6px;
    margin-bottom:6px;
}

.weekday {
    text-align:center;
    color:var(--sub);
    font-size:0.72rem;
    font-weight:900;
}

.calendar-grid {
    display:grid;
    grid-template-columns:repeat(7, 1fr);
    gap:6px;
}

.day {
    min-height:112px;
    background:#fbfdfb;
    border:1px solid var(--border);
    border-radius:16px;
    padding:7px;
    overflow:hidden;
}

.day.empty {
    background:transparent;
    border:none;
}

.day.today {
    border:2px solid var(--primary);
    background:#f6fff7;
}

.day-num {
    font-size:0.75rem;
    font-weight:950;
    color:#607061;
    margin-bottom:5px;
}

.log-pill {
    background:white;
    border:1px solid #e5eee4;
    border-left:4px solid var(--primary);
    border-radius:10px;
    padding:5px 6px;
    margin-bottom:5px;
    cursor:pointer;
    box-shadow:0 2px 6px rgba(65,95,70,0.06);
}

.log-time {
    font-size:0.65rem;
    font-weight:950;
    color:var(--primary-dark);
    margin-bottom:2px;
}

.log-text {
    font-size:0.68rem;
    font-weight:750;
    color:#3e473f;
    line-height:1.25;
    word-break:break-word;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

.today-list-card {
    background:var(--cream);
    border:1px solid var(--border);
    border-radius:24px;
    padding:14px;
    margin-top:14px;
}

.today-list-title {
    font-size:0.95rem;
    font-weight:950;
    color:var(--primary-dark);
    margin-bottom:8px;
}

.today-item {
    display:flex;
    align-items:flex-start;
    gap:10px;
    padding:10px 0;
    border-bottom:1px solid #ece7d7;
}

.today-item:last-child {
    border-bottom:none;
}

.today-time {
    min-width:52px;
    font-weight:950;
    color:var(--primary-dark);
    font-size:0.86rem;
}

.today-text {
    flex:1;
    line-height:1.5;
    font-size:0.9rem;
    word-break:break-word;
}

.today-edit {
    border:none;
    background:#eef5ec;
    color:var(--primary-dark);
    border-radius:10px;
    padding:6px 8px;
    font-size:0.72rem;
    font-weight:900;
    cursor:pointer;
}

.modal {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.42);
    z-index:100;
    align-items:center;
    justify-content:center;
    padding:18px;
}

.modal-content {
    width:min(460px, 100%);
    background:white;
    border-radius:26px;
    padding:20px;
    box-shadow:0 18px 40px rgba(0,0,0,0.18);
}

.modal-title {
    font-size:1.1rem;
    font-weight:950;
    color:var(--primary-dark);
    margin-bottom:12px;
}

.modal-label {
    font-size:0.76rem;
    font-weight:900;
    color:var(--sub);
    margin:10px 0 6px;
}

.modal-input,
.modal-textarea {
    width:100%;
    border:1px solid var(--border);
    border-radius:16px;
    padding:12px;
    outline:none;
    font-size:0.95rem;
    background:#fbfdfb;
}

.modal-textarea {
    min-height:120px;
    resize:vertical;
    line-height:1.5;
}

.modal-actions {
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-top:14px;
}

.modal-actions .btn {
    box-shadow:none;
}

#importMergeFile,
#importOverwriteFile {
    display:none;
}

@media (max-width:720px) {
    body {
        padding:10px;
        padding-top:max(10px, env(safe-area-inset-top));
        padding-bottom:max(10px, env(safe-area-inset-bottom));
    }

    .title {
        font-size:1.35rem;
    }

    .calendar-card {
        padding:12px;
        border-radius:24px;
    }

    .calendar-grid,
    .weekdays {
        gap:4px;
    }

    .day {
        min-height:92px;
        border-radius:12px;
        padding:5px;
    }

    .log-pill {
        padding:4px 5px;
        border-radius:8px;
    }

    .log-time {
        font-size:0.58rem;
    }

    .log-text {
        font-size:0.6rem;
        -webkit-line-clamp:2;
    }

    .input-row {
        gap:6px;
    }

    #logInput {
        padding:14px 12px;
        font-size:0.95rem;
    }

    .add-btn {
        padding:14px 13px;
    }
}

@media (max-width:430px) {
    .day {
        min-height:78px;
    }

    .day-num {
        font-size:0.68rem;
    }

    .log-text {
        font-size:0.56rem;
    }

    .log-time {
        font-size:0.55rem;
    }
}
</style>
</head>

<body>
<div class="app">
    <header class="header">
        <div class="title">콘서타 복약일지 🌿</div>
        <div class="subtitle">
            복약 여부와 그때의 감정/몸 상태를 간단히 기록하는 개인용 로그
        </div>
    </header>

    <section class="quick-card">
        <div class="input-row">
            <input id="logInput" type="text" placeholder="먹음 / 집중됨 / 불안함 / 졸림..." autocomplete="off">
            <button class="add-btn" onclick="addLog()">기록</button>
        </div>
        <div class="hint">엔터를 누르면 현재 시간으로 바로 기록돼. 캘린더 기록을 누르면 날짜/시간/내용 수정과 삭제가 가능해.</div>
    </section>

    <section class="backup-zone">
        <button class="btn" onclick="exportData()">💾 백업</button>
        <button class="btn merge" onclick="document.getElementById('importMergeFile').click()">🔀 통합</button>
        <button class="btn overwrite" onclick="document.getElementById('importOverwriteFile').click()">📂 불러오기</button>
    </section>

    <section class="calendar-card">
        <div class="calendar-head">
            <div class="month-title" id="monthTitle"></div>
            <div class="navs">
                <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
                <button class="nav-btn" onclick="goToday()">●</button>
                <button class="nav-btn" onclick="changeMonth(1)">▶</button>
            </div>
        </div>

        <div class="weekdays">
            <div class="weekday">일</div>
            <div class="weekday">월</div>
            <div class="weekday">화</div>
            <div class="weekday">수</div>
            <div class="weekday">목</div>
            <div class="weekday">금</div>
            <div class="weekday">토</div>
        </div>

        <div class="calendar-grid" id="calendarGrid"></div>

        <div class="today-list-card">
            <div class="today-list-title" id="selectedDateTitle">오늘의 기록</div>
            <div id="selectedList"></div>
        </div>
    </section>
</div>

<div class="modal" id="editModal">
    <div class="modal-content">
        <div class="modal-title">기록 수정</div>

        <div class="modal-label">날짜</div>
        <input class="modal-input" id="editDate" type="date">

        <div class="modal-label">시간</div>
        <input class="modal-input" id="editTime" type="time">

        <div class="modal-label">내용</div>
        <textarea class="modal-textarea" id="editText"></textarea>

        <div class="modal-actions">
            <button class="btn merge" onclick="saveEdit()">저장</button>
            <button class="btn overwrite" onclick="deleteEditingLog()">삭제</button>
            <button class="btn" onclick="closeModal()">닫기</button>
        </div>
    </div>
</div>

<input type="file" id="importMergeFile" accept=".json" onchange="mergeData(event)">
<input type="file" id="importOverwriteFile" accept=".json" onchange="overwriteData(event)">

<script>
const STORAGE_KEY = "ConcertaLog_v1";

let state = loadState();
let viewDate = new Date();
let selectedDateKey = makeDateKey(new Date());
let editingId = null;

const monthNames = [
    "January", "February", "March", "April", "May", "June",
    "July", "August", "September", "October", "November", "December"
];

window.onload = () => {
    renderAll();

    document.getElementById("logInput").addEventListener("keydown", e => {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            addLog();
        }
    });
};

function loadState() {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
    if (saved && Array.isArray(saved.logs)) return normalizeState(saved);
    return { logs: [] };
}

function normalizeState(data) {
    return {
        logs: (data.logs || []).map(log => ({
            id: log.id || "log_" + Date.now() + Math.random(),
            text: log.text || "",
            dateKey: log.dateKey || makeDateKey(new Date(log.timestamp || Date.now())),
            time: log.time || formatTime(new Date(log.timestamp || Date.now())),
            timestamp: log.timestamp || new Date().toISOString(),
            updatedAt: log.updatedAt || null
        }))
    };
}

function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function addLog() {
    const input = document.getElementById("logInput");
    const text = input.value.trim();
    if (!text) return;

    const now = new Date();

    const log = {
        id: "log_" + Date.now(),
        text,
        dateKey: makeDateKey(now),
        time: formatTime(now),
        timestamp: now.toISOString(),
        updatedAt: now.toISOString()
    };

    state.logs.push(log);
    selectedDateKey = log.dateKey;
    viewDate = new Date(now.getFullYear(), now.getMonth(), 1);

    saveState();
    input.value = "";
    renderAll();
}

function logsForDate(dateKey) {
    return state.logs
        .filter(log => log.dateKey === dateKey)
        .sort((a, b) => String(a.time).localeCompare(String(b.time)));
}

function renderAll() {
    renderCalendar();
    renderSelectedList();
}

function renderCalendar() {
    const year = viewDate.getFullYear();
    const month = viewDate.getMonth();

    document.getElementById("monthTitle").innerText = `${monthNames[month]} ${year}`;

    const grid = document.getElementById("calendarGrid");
    grid.innerHTML = "";

    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);

    for (let i = 0; i < firstDay.getDay(); i++) {
        grid.innerHTML += `<div class="day empty"></div>`;
    }

    for (let day = 1; day <= lastDay.getDate(); day++) {
        const tempDate = new Date(year, month, day);
        const dateKey = makeDateKey(tempDate);
        const dayLogs = logsForDate(dateKey);
        const isToday = dateKey === makeDateKey(new Date());

        grid.innerHTML += `
            <div class="day ${isToday ? "today" : ""}" onclick="selectDate('${dateKey}')">
                <div class="day-num">${day}</div>
                ${dayLogs.map(log => `
                    <div class="log-pill" onclick="event.stopPropagation(); openEdit('${log.id}')">
                        <div class="log-time">${escapeHtml(log.time)}</div>
                        <div class="log-text">${escapeHtml(log.text)}</div>
                    </div>
                `).join("")}
            </div>
        `;
    }
}

function renderSelectedList() {
    const title = document.getElementById("selectedDateTitle");
    const list = document.getElementById("selectedList");
    const logs = logsForDate(selectedDateKey);

    title.innerText = `${formatDateKorean(selectedDateKey)} 기록`;

    list.innerHTML = logs.length
        ? logs.map(log => `
            <div class="today-item">
                <div class="today-time">${escapeHtml(log.time)}</div>
                <div class="today-text">${escapeHtml(log.text)}</div>
                <button class="today-edit" onclick="openEdit('${log.id}')">수정</button>
            </div>
        `).join("")
        : `<div style="color:var(--sub); font-size:0.86rem; font-weight:750; padding:6px 0;">이 날짜에는 아직 기록이 없어.</div>`;
}

function selectDate(dateKey) {
    selectedDateKey = dateKey;
    renderSelectedList();
}

function openEdit(id) {
    const log = state.logs.find(item => item.id === id);
    if (!log) return;

    editingId = id;
    document.getElementById("editDate").value = log.dateKey || makeDateKey(new Date());
    document.getElementById("editTime").value = log.time || "00:00";
    document.getElementById("editText").value = log.text || "";
    document.getElementById("editModal").style.display = "flex";
}

function saveEdit() {
    const log = state.logs.find(item => item.id === editingId);
    if (!log) return;

    const newDate = document.getElementById("editDate").value;
    const newTime = document.getElementById("editTime").value;
    const newText = document.getElementById("editText").value.trim();

    if (!newDate) {
        alert("날짜를 선택해줘.");
        return;
    }

    if (!newText) {
        alert("내용이 비어있으면 저장할 수 없어.");
        return;
    }

    log.dateKey = newDate;
    log.time = newTime || log.time;
    log.text = newText;
    log.updatedAt = new Date().toISOString();

    const movedDate = parseDateKey(newDate);
    if (!isNaN(movedDate.getTime())) {
        selectedDateKey = newDate;
        viewDate = new Date(movedDate.getFullYear(), movedDate.getMonth(), 1);
    }

    saveState();
    closeModal();
    renderAll();
}

function deleteEditingLog() {
    if (!editingId) return;
    if (!confirm("이 기록을 삭제할까?")) return;

    state.logs = state.logs.filter(log => log.id !== editingId);
    saveState();

    closeModal();
    renderAll();
}

function closeModal() {
    editingId = null;
    document.getElementById("editModal").style.display = "none";
}

function changeMonth(step) {
    viewDate.setMonth(viewDate.getMonth() + step);
    renderCalendar();
}

function goToday() {
    const today = new Date();
    viewDate = new Date(today.getFullYear(), today.getMonth(), 1);
    selectedDateKey = makeDateKey(today);
    renderAll();
}

function exportData() {
    const data = {
        app: "Concerta Log",
        version: 1,
        exportedAt: new Date().toISOString(),
        ...state
    };

    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = `콘서타 로그 백업_phone.json`;
    a.click();

    URL.revokeObjectURL(url);
}

function parseImported(parsed) {
    if (!parsed || !Array.isArray(parsed.logs)) return null;
    return normalizeState(parsed);
}

function makeLogKey(log) {
    return `${log.dateKey || ""}::${log.time || ""}::${String(log.text || "").trim().toLowerCase()}`;
}

function mergeData(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = e => {
        try {
            const imported = parseImported(JSON.parse(e.target.result));

            if (!imported) {
                alert("통합할 수 있는 백업 파일이 아니야 ㅠㅠ");
                return;
            }

            if (!confirm("현재 기록은 유지하고 백업 파일을 통합할까?")) return;

            const map = new Map();
            state.logs.forEach(log => map.set(makeLogKey(log), log));

            let added = 0;
            let merged = 0;

            imported.logs.forEach(incoming => {
                const key = makeLogKey(incoming);
                if (map.has(key)) {
                    merged++;
                } else {
                    state.logs.push(incoming);
                    map.set(key, incoming);
                    added++;
                }
            });

            saveState();
            renderAll();

            alert(`통합 완료! 새 기록 ${added}개 추가, 중복 기록 ${merged}개 정리했어.`);
        } catch {
            alert("파일을 통합하는 중 문제가 생겼어 ㅠㅠ");
        }

        event.target.value = "";
    };

    reader.readAsText(file);
}

function overwriteData(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = e => {
        try {
            const imported = parseImported(JSON.parse(e.target.result));

            if (!imported) {
                alert("불러올 수 있는 백업 파일이 아니야 ㅠㅠ");
                return;
            }

            if (!confirm("현재 기록이 백업 파일 내용으로 교체돼. 계속할까?")) return;

            state = imported;
            saveState();
            renderAll();

            alert("불러오기 완료!");
        } catch {
            alert("파일을 불러오는 중 문제가 생겼어 ㅠㅠ");
        }

        event.target.value = "";
    };

    reader.readAsText(file);
}

function makeDateKey(date) {
    return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
}

function formatTime(date) {
    return `${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
}

function parseDateKey(dateKey) {
    return new Date(dateKey + "T00:00:00");
}

function formatDateKorean(dateKey) {
    const [y, m, d] = dateKey.split("-");
    return `${Number(m)}월 ${Number(d)}일`;
}

function escapeHtml(text) {
    return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}
</script>
</body>
