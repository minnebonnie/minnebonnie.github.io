<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바니의 독서기록장 📖</title>
    
    <link rel="shortcut icon" href="icon.png" type="image/x-icon">
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        :root { --primary: #6f42c1; --bg: #f8f9fa; --card-bg: #ffffff; --star: #ffc107; --reading: #3a86ff; --done: #06d6a0; --giveup: #ef476f; --danger: #ef476f; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: #333; -webkit-font-smoothing: antialiased; }
        
        /* 🗺️ 상단 내비게이션 메뉴 */
        .nav-bar { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .nav-btn { background: #dee2e6; color: #495057; border: none; padding: 14px 28px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); -webkit-tap-highlight-color: transparent; }
        .nav-btn.active { background: var(--primary); color: white; }

        /* 화면 뷰 제어 */
        .view-panel { display: none; }
        .view-panel.active { display: block; }

        /* 대시보드 레이아웃 (서재 전용) */
        .dashboard { display: grid; grid-template-columns: 380px 1fr; gap: 25px; max-width: 1400px; margin: 0 auto; }
        @media (max-width: 1024px) { .dashboard { grid-template-columns: 1fr; } }
        
        .card { background: var(--card-bg); padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; box-sizing: border-box; }
        h2 { margin-top: 0; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; gap: 10px; color: #444; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; font-weight: 800; }

        /* 📗 새 책 등록 */
        .book-input-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        #newBookTitle, .transcription-select { padding: 15px; border-radius: 15px; border: 1px solid #f0f0f0; background: #fafafa; outline: none; font-size: 0.9rem; font-family: inherit; width: 100%; box-sizing: border-box; }
        .file-label { display: block; padding: 15px; background: #f0f0f0; border-radius: 15px; text-align: center; cursor: pointer; font-size: 0.85rem; font-weight: 600; border: 2px dashed #ccc; color: #777; transition: 0.2s; }
        .file-label:hover { background: #e9ecef; }
        #newBookFile { display: none; }
        .add-btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .add-btn:hover { opacity: 0.9; }

        /* 📚 도서 리스트 */
        .book-list { display: flex; flex-direction: column; gap: 12px; max-height: 440px; overflow-y: auto; padding-right: 5px; }
        .book-item { display: flex; gap: 15px; padding: 12px; background: #fff; border: 1px solid #eee; border-radius: 15px; cursor: grab; transition: 0.2s; position: relative; }
        .book-item:hover { transform: translateY(-2px); box-shadow: 0 5px 10px rgba(0,0,0,0.05); }
        .book-thumb { width: 55px; height: 75px; object-fit: cover; border-radius: 6px; background: #eee; pointer-events: none; }
        .book-info { flex: 1; display: flex; flex-direction: column; justify-content: center; pointer-events: none; }
        .book-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 220px; }
        .status-badge { font-size: 0.65rem; padding: 3px 10px; border-radius: 6px; color: white; font-weight: 800; margin-bottom: 6px; display: inline-block; width: fit-content; }
        .status-reading { background: var(--reading); }
        .status-done { background: var(--done); }
        .status-giveup { background: var(--giveup); }
        .star-filled { color: var(--star); }
        .star-empty { color: #e0e0e0; }

        /* ✍️ 와이드 필사 스페이스 전용 레이아웃 */
        .trans-space { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr; gap: 20px; }
        
        /* 🛠️ 필사 기록장 헤더 정렬용 컨테이너 */
        .trans-filter-wrapper { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 20px; }
        .trans-tab-group { display: flex; gap: 6px; background: #e9ecef; padding: 5px; border-radius: 12px; }
        .trans-tab { border: none; background: none; padding: 10px 16px; font-size: 0.88rem; font-weight: 700; cursor: pointer; border-radius: 9px; color: #495057; transition: 0.2s; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
        .trans-tab.active { background: #fff; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        /* 🔍 책별 필터 선택상자 */
        .book-filter-select { padding: 10px 15px; border-radius: 12px; border: 1px solid #ddd; background: #fff; font-size: 0.88rem; font-weight: bold; outline: none; color: #495057; cursor: pointer; max-width: 280px; }

        .trans-list { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .trans-item { background: #fff; border: 1px solid #e9ecef; padding: 20px; border-radius: 18px; position: relative; border-left: 5px solid #ced4da; box-shadow: 0 4px 10px rgba(0,0,0,0.02); transition: 0.2s; }
        .trans-item.pinned { border-left-color: #ff5252; background: #fffbfb; }
        
        /* 🔥 날짜 겹침 방지 개선 레이아웃 */
        .trans-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 12px; padding-right: 150px; }
        .trans-book-title { font-size: 0.95rem; font-weight: 700; color: #333; }
        .trans-date-badge { font-size: 0.75rem; font-weight: normal; color: #888; background: #f1f3f5; padding: 2px 8px; border-radius: 6px; }
        @media (max-width: 500px) { .trans-meta { padding-right: 0; margin-top: 35px; } }

        /* 영어 단어가 중간에 끊기지 않고 묶어서 떨어지도록 스타일 최적화 */
        .trans-text { font-size: 0.95rem; line-height: 1.6; color: #333; white-space: pre-wrap; word-break: keep-all; word-wrap: break-word; }
        
        .trans-actions { position: absolute; top: 16px; right: 16px; display: flex; gap: 6px; z-index: 5; }
        .trans-icon-btn { border: none; background: #f1f3f5; cursor: pointer; font-size: 0.95rem; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #adb5bd; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .trans-icon-btn:hover { background: #e9ecef; }
        .trans-icon-btn.active { color: var(--star); background: #fff3cd; }
        .trans-icon-btn.fav.active { color: #ff5252; background: #ffe3e3; }
        
        .trans-btn-wrap { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }
        .trans-mini-btn { font-size: 0.8rem; padding: 6px 12px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; font-weight: bold; }

        /* 🗓️ 캘린더 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        @media (max-width: 768px) { .calendar-grid { gap: 4px; } }
        .cal-day { background: white; border: 1px solid #eee; border-radius: 15px; min-height: 140px; padding: 10px; position: relative; box-sizing: border-box; }
        @media (max-width: 768px) { .cal-day { min-height: 90px; padding: 5px; } }
        .cal-day.drag-over { background: #f0ebff; border-color: var(--primary); }
        .cal-date-label { font-size: 0.85rem; font-weight: 800; color: #555; }
        .cal-book-container { position: relative; width: 100%; aspect-ratio: 3/4; margin-top: 8px; }
        .cal-book-img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; box-shadow: 2px 2px 6px rgba(0,0,0,0.1); }
        .trash-icon { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); border-radius: 6px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.2s; cursor: pointer; color: white; font-size: 1.2rem; }
        .cal-book-container:hover .trash-icon { opacity: 1; }

        /* 💾 통합 백업 세션 */
        .backup-section { margin-top: 25px; padding-top: 20px; border-top: 1px solid #eee; display: flex; flex-direction: column; gap: 8px; }
        .backup-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        @media (max-width: 400px) { .backup-grid { grid-template-columns: 1fr; } }
        .backup-btn { background: #fff; border: 1.5px solid #ddd; padding: 10px 4px; border-radius: 12px; font-size: 0.78rem; font-weight: 700; color: #555; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; transition: 0.2s; }
        .backup-btn:hover { background: #f8f9fa; border-color: #bbb; }

        /* 📝 모달 창 구조 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 25px; width: 90%; max-width: 480px; max-height: 85vh; overflow-y: auto; box-sizing: border-box; }
        .status-selector { display: flex; gap: 10px; margin: 20px 0; }
        .status-opt { flex: 1; padding: 12px; border-radius: 12px; border: 2px solid #f0f0f0; text-align: center; cursor: pointer; font-size: 0.85rem; font-weight: bold; color: #aaa; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .status-opt.active[data-val="reading"] { border-color: var(--reading); color: var(--reading); background: #ebf3ff; }
        .status-opt.active[data-val="done"] { border-color: var(--done); color: var(--done); background: #e6fcf5; }
        .status-opt.active[data-val="giveup"] { border-color: var(--giveup); color: var(--giveup); background: #fff5f5; }
        textarea { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #f0f0f0; box-sizing: border-box; resize: none; margin-bottom: 20px; font-family: inherit; font-size: 0.9rem; background: #fafafa; outline: none; }
        .save-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .save-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <button id="btnMainView" class="nav-btn active" onclick="switchView('main')">📚 나의 서재 & 캘린더</button>
        <button id="btnTransView" class="nav-btn" onclick="switchView('trans')">✍️ 독서 필사 스페이스</button>
    </div>

    <div id="mainViewPanel" class="view-panel active">
        <div class="dashboard">
            <div class="left-panel">
                <div class="card">
                    <h2>📗 새 책 등록</h2>
                    <div class="book-input-group">
                        <input type="text" id="newBookTitle" placeholder="어떤 책을 읽기 시작했어?">
                        <label for="newBookFile" class="file-label" id="filePlaceholder">📷 표지 사진 업로드</label>
                        <input type="file" id="newBookFile" accept="image/*" onchange="handleFileSelect(this)">
                        <button class="add-btn" onclick="addBook()">내 서재에 쏙! 💜</button>
                    </div>
                    
                    <h2>📚 나의 서재</h2>
                    <div class="filter-group" style="margin-bottom:15px; background:#f3f3f3; padding:10px; border-radius:12px; display:flex;">
                        <select id="ratingFilter" onchange="renderAll()" style="flex:1; padding:8px; border-radius:8px; border:1px solid #ddd; font-size:0.8rem; background: #fff; outline: none;">
                            <option value="all">모든 별점 한눈에 보기</option>
                            <option value="5">⭐⭐⭐⭐⭐ (5.0)</option>
                            <option value="4">⭐⭐⭐⭐ (4.0 ~ 4.5)</option>
                            <option value="3">⭐⭐⭐ (3.0 ~ 3.5)</option>
                            <option value="2">⭐⭐ (2.0 ~ 2.5)</option>
                            <option value="1">⭐ (1.0 ~ 1.5)</option>
                            <option value="0">평점 대기 중 / 0점</option>
                        </select>
                    </div>

                    <div id="bookList" class="book-list"></div>

                    <div class="backup-section">
                        <div style="font-size:0.8rem; font-weight:bold; color:#777; margin-bottom:4px; text-align:center;">📊 데이터 통합 보관소</div>
                        <div class="backup-grid">
                            <button class="backup-btn" onclick="exportData()" title="현재 데이터를 파일로 내려받습니다.">💾 백업</button>
                            <button class="backup-btn" onclick="triggerImport('merge')" style="border-color: #a8a29e; color: #1c1917;" title="기존 데이터에 새 파일 데이터를 합칩니다.">✨ 데이터 통합</button>
                            <button class="backup-btn" onclick="triggerImport('overwrite')" style="color: var(--danger);" title="기존 데이터를 밀어버리고 파일 내용으로 교체합니다.">📂 전체 복구</button>
                        </div>
                        <input type="file" id="importFile" style="display:none;" onchange="handleImportFile(event)">
                    </div>
                </div>
            </div>

            <div class="right-panel">
                <div class="card">
                    <div style="display:flex; justify-content:center; align-items:center; gap:20px; margin-bottom:20px;">
                        <button onclick="changeMonth(-1)" style="border:none; background:none; cursor:pointer; font-size:1.2rem; padding: 5px 10px;">◀</button>
                        <div id="monthLabel" style="font-weight:800; font-size:1.2rem; color:var(--primary); min-width:150px; text-align:center;"></div>
                        <button onclick="changeMonth(1)" style="border:none; background:none; cursor:pointer; font-size:1.2rem; padding: 5px 10px;">▶</button>
                    </div>
                    <div id="calendarGrid" class="calendar-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="transViewPanel" class="view-panel">
        <div class="trans-space">
            <div class="card">
                <h2>✍️ 오늘 마음에 들어온 책 속 한 문장</h2>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-top: 15px;">
                    <div>
                        <label style="font-size: 0.85rem; font-weight: bold; color: #666; margin-bottom: 8px; display: block;">1. 필사할 도서 선정</label>
                        <select id="transBookSelect" class="transcription-select" style="background:#fff; border: 1px solid #ddd;">
                            <option value="">▼ 어떤 책을 필사할까?</option>
                        </select>
                    </div>
                    <div>
                        <label style="font-size: 0.85rem; font-weight: bold; color: #666; margin-bottom: 8px; display: block;">2. 마음에 콕 박힌 글귀 붙여넣기</label>
                        <textarea id="transInput" placeholder="복사한 문장을 통째로 편하게 붙여넣어 봐 바니! 📄" style="height: 100px; margin-bottom: 0; background: #fff; border: 1px solid #ddd;"></textarea>
                    </div>
                </div>
                <div style="text-align: right; margin-top: 15px;">
                    <button class="add-btn" onclick="addTranscription()" style="background: #3a86ff; padding: 12px 35px; border-radius: 12px; font-size: 0.95rem;">로그 저장하기 💾</button>
                </div>
            </div>

            <div class="card">
                <h2>📜 내가 차곡차곡 모은 필사 기록장</h2>
                
                <div class="trans-filter-wrapper">
                    <div class="trans-tab-group">
                        <button class="trans-tab active" data-tab="all" onclick="setTransTab('all')">전체보기</button>
                        <button class="trans-tab" data-tab="normal" onclick="setTransTab('normal')">일반</button>
                        <button class="trans-tab" data-tab="pin" onclick="setTransTab('pin')">📌 핀 고정</button>
                        <button class="trans-tab" data-tab="fav" onclick="setTransTab('fav')">❤️ 즐겨찾기</button>
                    </div>
                    
                    <select id="transBookFilter" class="book-filter-select" onchange="renderTranscriptions()">
                        <option value="all">📚 모든 책 필사 모아보기</option>
                    </select>
                </div>

                <div id="transcriptionList" class="trans-list"></div>
            </div>
        </div>
    </div>

    <div id="bookModal" class="modal">
        <div class="modal-content">
            <div style="display:flex; gap:20px; align-items:center;">
                <img id="modalCover" style="width:100px; height:140px; border-radius:12px; object-fit:cover; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                <div>
                    <h3 id="modalTitle" style="margin:0; font-size:1.1rem;"></h3>
                    <div id="starContainer" style="font-size:1.6rem; color:#ddd; cursor:pointer; display:flex; gap:4px; margin-top:8px;"></div>
                </div>
            </div>
            <div class="status-selector">
                <div class="status-opt" data-val="reading" onclick="setStatus('reading')">읽는 중</div>
                <div class="status-opt" data-val="done" onclick="setStatus('done')">완독</div>
                <div class="status-opt" data-val="giveup" onclick="setStatus('giveup')">중도포기</div>
            </div>
            <label style="font-size: 0.8rem; font-weight: 800; color: #555; margin-bottom: 8px; display: block;">바니의 한 줄 평 💭</label>
            <textarea id="modalReview" placeholder="이 책은 바니에게 어떤 의미였어?"></textarea>
            <label style="font-size: 0.8rem; font-weight: 800; color: #555; margin-bottom: 8px; display: block;">마음에 콕 박힌 문장 필사 📝</label>
            <textarea id="modalQuote" placeholder="잊고 싶지 않은 소중한 문장을 남겨줘" style="border-left: 4px solid var(--primary);"></textarea>
            <button class="save-btn" onclick="saveBookDetail()">소중한 기록 저장하기 💜</button>
            <button style="width:100%; border:none; color:#bbb; margin-top:15px; cursor:pointer; background:none; font-weight:bold;" onclick="closeModal()">나중에 기록할래</button>
            <button style="width:100%; border:none; color:#ffb3b3; margin-top:10px; cursor:pointer; background:none; font-size:0.7rem;" onclick="deleteCurrentBook()">서재에서 이 책 영영 지우기 🗑️</button>
        </div>
    </div>

<script>
    let books = JSON.parse(localStorage.getItem('bunnyBooks') || '[]');
    let readings = JSON.parse(localStorage.getItem('bunnyReadings') || '[]');
    let transcriptions = JSON.parse(localStorage.getItem('bunnyTranscriptions') || '[]');
    
    let currentViewDate = new Date();
    let currentEditingBookId = null;
    let tempRating = 0;
    let tempStatus = 'reading';
    let selectedFileData = null;
    let currentTransTab = 'all';
    let importMode = 'merge';

    const DEFAULT_COVER = 'https://images.unsplash.com/photo-1543002588-bfa74002ed7e?q=80&w=300&auto=format&fit=crop';

    window.onload = () => { renderAll(); };

    function save() {
        localStorage.setItem('bunnyBooks', JSON.stringify(books));
        localStorage.setItem('bunnyReadings', JSON.stringify(readings));
        localStorage.setItem('bunnyTranscriptions', JSON.stringify(transcriptions));
    }

    function switchView(view) {
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.view-panel').forEach(panel => panel.classList.remove('active'));

        if(view === 'main') {
            document.getElementById('btnMainView').classList.add('active');
            document.getElementById('mainViewPanel').classList.add('active');
        } else {
            document.getElementById('btnTransView').classList.add('active');
            document.getElementById('transViewPanel').classList.add('active');
            renderTranscriptions();
        }
    }

    function handleFileSelect(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                selectedFileData = e.target.result;
                document.getElementById('filePlaceholder').innerText = "✅ 표지 준비 완료!";
                document.getElementById('filePlaceholder').style.color = "var(--primary)";
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function addBook() {
        const title = document.getElementById('newBookTitle').value.trim();
        if(!title) return alert("책 제목을 입력해줘 바니!");
        books.unshift({ id: Date.now(), title, cover: selectedFileData || DEFAULT_COVER, rating: 0, status: 'reading', review: '', quote: '' });
        save();
        document.getElementById('newBookTitle').value = '';
        selectedFileData = null;
        document.getElementById('filePlaceholder').innerText = "📷 표지 사진 업로드";
        document.getElementById('filePlaceholder').style.color = "#777";
        renderAll();
    }

    function deleteCurrentBook() {
        if(!confirm("이 책을 정말 지울까?")) return;
        books = books.filter(b => b.id !== currentEditingBookId);
        readings = readings.filter(r => r.bookId !== currentEditingBookId);
        transcriptions = transcriptions.filter(t => t.bookId !== currentEditingBookId);
        save(); closeModal(); renderAll();
    }

    function deleteCalendarItem(index) {
        readings.splice(index, 1);
        save(); renderAll();
    }

    function setStatus(val) {
        tempStatus = val;
        document.querySelectorAll('.status-opt').forEach(opt => {
            opt.classList.toggle('active', opt.dataset.val === val);
        });
    }

    function addTranscription() {
        const bookId = parseInt(document.getElementById('transBookSelect').value);
        const text = document.getElementById('transInput').value.trim();
        
        if(!bookId) return alert("필사할 책을 목록에서 먼저 선택해줘 바니! 📚");
        if(!text) return alert("필사할 아름다운 구절을 입력해줘! 📄");

        const selectedBook = books.find(b => b.id === bookId);
        const today = new Date();
        const dateStr = `${today.getFullYear()}.${(today.getMonth()+1).toString().padStart(2,'0')}.${today.getDate().toString().padStart(2,'0')}`;

        transcriptions.unshift({
            id: Date.now(),
            bookId: bookId,
            bookTitle: selectedBook.title,
            text: text,
            date: dateStr,
            isPinned: false,
            isFav: false
        });

        save();
        document.getElementById('transInput').value = '';
        renderTranscriptions();
    }

    function togglePinTrans(id) {
        const item = transcriptions.find(t => t.id === id);
        if(item) { item.isPinned = !item.isPinned; save(); renderTranscriptions(); }
    }

    function toggleFavTrans(id) {
        const item = transcriptions.find(t => t.id === id);
        if(item) { item.isFav = !item.isFav; save(); renderTranscriptions(); }
    }

    function deleteTrans(id) {
        if(!confirm("이 필사 로그를 정말로 지울까 바니?")) return;
        transcriptions = transcriptions.filter(t => t.id !== id);
        save(); renderTranscriptions();
    }

    function startEditTrans(id) {
        document.getElementById(`trans-item-${id}`).classList.add('editing');
        document.getElementById(`trans-display-${id}`).style.display = 'none';
        document.getElementById(`trans-edit-box-${id}`).style.display = 'block';
    }

    function cancelEditTrans(id) {
        document.getElementById(`trans-item-${id}`).classList.remove('editing');
        document.getElementById(`trans-display-${id}`).style.display = 'block';
        document.getElementById(`trans-edit-box-${id}`).style.display = 'none';
    }

    function saveEditTrans(id) {
        const newText = document.getElementById(`textarea-${id}`).value.trim();
        if(!newText) return alert("내용을 입력해 주세요!");
        const item = transcriptions.find(t => t.id === id);
        if(item) { item.text = newText; save(); renderTranscriptions(); }
    }

    function setTransTab(tab) {
        currentTransTab = tab;
        document.querySelectorAll('.trans-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
        renderTranscriptions();
    }

    function renderTranscriptions() {
        const listContainer = document.getElementById('transcriptionList');
        if (!listContainer) return;

        let filtered = transcriptions.filter(t => {
            if (currentTransTab === 'pin') return t.isPinned;
            if (currentTransTab === 'fav') return t.isFav;
            if (currentTransTab === 'normal') return !t.isPinned && !t.isFav;
            return true;
        });

        const bookFilterSelect = document.getElementById('transBookFilter');
        if (bookFilterSelect) {
            const selectedBookId = bookFilterSelect.value;
            if (selectedBookId !== 'all') {
                filtered = filtered.filter(t => t.bookId === parseInt(selectedBookId));
            }
        }

        filtered.sort((a, b) => b.id - a.id);

        listContainer.innerHTML = filtered.map(t => `
            <div class="trans-item ${t.isPinned ? 'pinned' : ''}" id="trans-item-${t.id}">
                <div class="trans-meta">
                    <span class="trans-book-title">📖 ${t.bookTitle}</span>
                    <span class="trans-date-badge">${t.date}</span>
                </div>
                
                <div class="trans-text" id="trans-display-${t.id}">${t.text}</div>
                
                <div id="trans-edit-box-${t.id}" style="display:none; margin-top:5px;">
                    <textarea id="textarea-${t.id}" style="height:80px; margin-bottom:5px; background:#fff;">${t.text}</textarea>
                    <div class="trans-btn-wrap">
                        <button class="trans-mini-btn" onclick="saveEditTrans(${t.id})" style="background:var(--primary); color:#fff; border:none;">수정 완료</button>
                        <button class="trans-mini-btn" onclick="cancelEditTrans(${t.id})">취소</button>
                    </div>
                </div>

                <div class="trans-actions">
                    <button class="trans-icon-btn ${t.isPinned ? 'active' : ''}" onclick="togglePinTrans(${t.id})" title="상단 고정">📌</button>
                    <button class="trans-icon-btn fav ${t.isFav ? 'active' : ''}" onclick="toggleFavTrans(${t.id})" title="즐겨찾기">${t.isFav ? '❤️' : '🤍'}</button>
                    <button class="trans-icon-btn" onclick="startEditTrans(${t.id})" title="글귀 수정">✏️</button>
                    <button class="trans-icon-btn" onclick="deleteTrans(${t.id})" title="삭제" style="color:#ef476f;">🗑️</button>
                </div>
            </div>
        `).join('') || '<p style="text-align:center; color:#ccc; font-size:0.9rem; padding:40px; grid-column: 1/-1;">해당 조건에 만족하는 필사 로그가 비어있어 바니! ✍️</p>';
    }

    function renderAll() {
        const filterVal = document.getElementById('ratingFilter').value;
        const list = document.getElementById('bookList');
        
        let filtered = books.filter(b => {
            if (filterVal === 'all') return true;
            if (filterVal === '0') return b.rating === 0;
            const fv = parseFloat(filterVal);
            return b.rating >= fv && b.rating < fv + 1;
        });

        list.innerHTML = filtered.map(b => `
            <div class="book-item" draggable="true" ondragstart="event.dataTransfer.setData('bookId', ${b.id})" onclick="openBookDetail(${b.id})">
                <img src="${b.cover}" class="book-thumb" onerror="this.src='${DEFAULT_COVER}'">
                <div class="book-info">
                    <span class="status-badge status-${b.status || 'reading'}">
                        ${b.status === 'reading' ? '읽는 중' : b.status === 'done' ? '완독' : '중도포기'}
                    </span>
                    <div class="book-title">${b.title}</div>
                    <div class="book-rating-display">${getStars(b.rating)}</div>
                </div>
            </div>
        `).join('') || '<p style="text-align:center; color:#ccc; font-size:0.8rem; padding:20px;">필터에 맞는 책이 없어 바니! 📚</p>';
        
        const selectBox = document.getElementById('transBookSelect');
        if(selectBox) {
            const currentValue = selectBox.value;
            selectBox.innerHTML = '<option value="">▼ 어떤 책을 필사할까?</option>' + books.map(b => `<option value="${b.id}">📖 ${b.title}</option>`).join('');
            selectBox.value = currentValue;
        }

        const transFilterSelect = document.getElementById('transBookFilter');
        if (transFilterSelect) {
            const currentFilterValue = transFilterSelect.value;
            transFilterSelect.innerHTML = '<option value="all">📚 모든 책 필사 모아보기</option>' + books.map(b => `<option value="${b.id}">📖 ${b.title}</option>`).join('');
            transFilterSelect.value = books.some(b => b.id === parseInt(currentFilterValue)) ? currentFilterValue : 'all';
        }

        renderCalendar();
        renderTranscriptions();
    }

    function getStars(rating) {
        let stars = '';
        for(let i=1; i<=5; i++){
            if(i <= rating) stars += '<span class="star-filled">★</span>';
            else if(i-0.5 === rating) stars += '<span class="star-filled">⯪</span>';
            else stars += '<span class="star-empty">☆</span>';
        }
        return stars;
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        document.getElementById('monthLabel').innerText = `${currentViewDate.getFullYear()}년 ${currentViewDate.getMonth() + 1}월`;
        grid.innerHTML = '';
        const first = new Date(currentViewDate.getFullYear(), currentViewDate.getMonth(), 1);
        const last = new Date(currentViewDate.getFullYear(), currentViewDate.getMonth() + 1, 0);

        for(let i=0; i<first.getDay(); i++) grid.innerHTML += `<div class="cal-day" style="border:none; background:none;"></div>`;
        for(let d=1; d<=last.getDate(); d++) {
            const dStr = new Date(currentViewDate.getFullYear(), currentViewDate.getMonth(), d).toDateString();
            const dayEl = document.createElement('div');
            dayEl.className = 'cal-day';
            dayEl.innerHTML = `<div class="cal-date-label">${d}</div><div style="display:flex; flex-wrap:wrap; gap:4px; margin-top:5px;"></div>`;
            
            dayEl.ondragover = (e) => { e.preventDefault(); dayEl.classList.add('drag-over'); };
            dayEl.ondragleave = () => { dayEl.classList.remove('drag-over'); };
            dayEl.ondrop = (e) => {
                e.preventDefault(); dayEl.classList.remove('drag-over');
                const id = parseInt(e.dataTransfer.getData('bookId'));
                if(id) { readings.push({ date: dStr, bookId: id }); save(); renderAll(); }
            };

            const wrapper = dayEl.querySelector('div:last-child');
            readings.forEach((r, idx) => {
                if(r.date === dStr) {
                    const b = books.find(book => book.id === r.bookId);
                    if(b) {
                        const container = document.createElement('div');
                        container.className = 'cal-book-container';
                        container.innerHTML = `
                            <img src="${b.cover}" class="cal-book-img" onerror="this.src='${DEFAULT_COVER}'">
                            <div class="trash-icon" onclick="event.stopPropagation(); deleteCalendarItem(${idx})">🗑️</div>
                        `;
                        wrapper.appendChild(container);
                    }
                }
            });
            grid.appendChild(dayEl);
        }
    }

    function openBookDetail(id) {
        const b = books.find(book => book.id === id);
        currentEditingBookId = id; tempRating = b.rating || 0;
        setStatus(b.status || 'reading');
        document.getElementById('modalTitle').innerText = b.title;
        document.getElementById('modalCover').src = b.cover;
        document.getElementById('modalCover').onerror = function() { this.src = DEFAULT_COVER; };
        document.getElementById('modalReview').value = b.review || '';
        document.getElementById('modalQuote').value = b.quote || '';
        renderModalStars(tempRating);
        document.getElementById('bookModal').style.display = 'flex';
    }

    function renderModalStars(rating) {
        const container = document.getElementById('starContainer');
        container.innerHTML = '';
        for(let i=1; i<=5; i++) {
            const span = document.createElement('span');
            span.innerHTML = (i <= rating) ? '★' : (i - 0.5 === rating) ? '⯪' : '★';
            if(i <= rating || i - 0.5 === rating) span.style.color = 'var(--star)';
            span.onclick = (e) => {
                const rect = span.getBoundingClientRect();
                tempRating = (e.clientX - rect.left < rect.width / 2) ? i - 0.5 : i;
                renderModalStars(tempRating);
            };
            container.appendChild(span);
        }
    }

    function saveBookDetail() {
        const b = books.find(book => book.id === currentEditingBookId);
        b.rating = tempRating; b.status = tempStatus;
        b.review = document.getElementById('modalReview').value;
        b.quote = document.getElementById('modalQuote').value;
        save(); closeModal(); renderAll();
    }
    function closeModal() { document.getElementById('bookModal').style.display = 'none'; }
    function changeMonth(s) { currentViewDate.setMonth(currentViewDate.getMonth() + s); renderAll(); }
    
    function exportData() {
        const data = JSON.stringify({ books, readings, transcriptions }, null, 2);
        const blob = new Blob([data], {type: "application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `북리스트 백업_phone.json`;
        a.click();
    }

    function triggerImport(mode) {
        importMode = mode;
        document.getElementById('importFile').click();
    }

    function handleImportFile(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const incoming = JSON.parse(ev.target.result);
                
                if(importMode === 'overwrite') {
                    if(!confirm("⚠️ 경고: 정말 기존 서재 기록을 전부 지우고 파일 안의 데이터로 싹 복구할까 바니?")) return;
                    books = incoming.books || [];
                    readings = incoming.readings || [];
                    transcriptions = incoming.transcriptions || [];
                    alert("기존 기록 위에 깔끔하게 복구 완료! 💜");
                } else {
                    const incomingBooks = incoming.books || [];
                    const incomingReadings = incoming.readings || [];
                    const incomingTranscriptions = incoming.transcriptions || [];

                    incomingBooks.forEach(inBook => {
                        if(!books.some(b => b.id === inBook.id || b.title === inBook.title)) {
                            books.push(inBook);
                        }
                    });
                    
                    incomingReadings.forEach(inRead => {
                        if(!readings.some(r => r.date === inRead.date && r.bookId === inRead.bookId)) {
                            readings.push(inRead);
                        }
                    });

                    incomingTranscriptions.forEach(inTrans => {
                        if(!transcriptions.some(t => t.text === inTrans.text)) {
                            transcriptions.push(inTrans);
                        }
                    });

                    alert("🎉 흩어져있던 기존 데이터와 새 데이터를 하나로 안전하게 합쳤어 바니!");
                }

                save(); 
                renderAll();
                e.target.value = '';
            } catch(err) {
                alert("🚨 올바른 파일 형식이 아닌 것 같아. 다시 한번 확인해줘!");
            }
        };
        reader.readAsText(file);
    }
</script>
</body>
