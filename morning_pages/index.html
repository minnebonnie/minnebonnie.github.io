<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="매일 아침 자유롭게 생각을 기록하는 나만의 모닝페이지">
<meta name="theme-color" content="#ffd152">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Morning Pages">
<title>Morning Pages ☀️</title>
<link rel="icon" type="image/png" href="./icon.png">
<link rel="apple-touch-icon" href="./icon.png">
<link rel="manifest" href="./manifest.webmanifest">

<style>
:root {
    /* ☀️ 햇빛 같은 노란색 중심의 따뜻한 톤 테마 */
    --bg:#fffdf4;
    --card:#ffffff;
    --text:#3a3528;
    --sub:#a29983;
    --border:#f7f1dd;
    --primary:#ffd152;
    --primary-dark:#d4a31c;
    --pink:#ffb3c6;
    --mint:#9cead9;
    --yellow:#fff2cc;
    --blue:#3a86ff; /* 성공 문구용 선명한 파란색 */
    --danger:#ff6b6b;
    --soft:#fff9e6;
    --shadow:0 12px 30px rgba(220, 190, 100, 0.15);
}

* {
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body {
    margin:0;
    min-height:100vh;
    /* 아침 햇살이 비치는 분위기의 배경 그라데이션 */
    background:
        radial-gradient(circle at top left, #fff1cc 0, transparent 35%),
        radial-gradient(circle at bottom right, #eefcf9 0, transparent 34%),
        var(--bg);
    color:var(--text);
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
}

button, input, textarea {
    font-family:inherit;
}

.app {
    max-width:1400px;
    margin:0 auto;
    padding:20px;
}

.topbar {
    background:rgba(255,255,255,0.85);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.7);
    border-radius:30px;
    padding:18px 20px;
    box-shadow:var(--shadow);
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:14px;
    margin-bottom:18px;
}

.logo {
    font-size:1.6rem;
    font-weight:950;
    letter-spacing:-0.05em;
}

.brand {
    display:flex;
    align-items:center;
    gap:12px;
}

.logo-icon {
    width:50px;
    height:50px;
    flex-shrink:0;
    border-radius:16px;
    object-fit:cover;
    box-shadow:0 7px 18px rgba(212, 163, 28, 0.18);
}

.logo span {
    color:var(--primary-dark);
}

.sub {
    color:var(--sub);
    font-size:0.82rem;
    font-weight:800;
    margin-top:3px;
}

.btn {
    border:none;
    border-radius:15px;
    padding:10px 13px;
    background:#f7f1dd;
    color:#6b5f43;
    font-size:0.82rem;
    font-weight:900;
    cursor:pointer;
}

.btn.primary {
    background:var(--primary);
    color:var(--text);
}

.btn.primary:hover {
    background:#fbc330;
}

.btn.merge {
    background:#e9fbf7;
    color:#16866f;
}

.btn.overwrite {
    background:#fff0f3;
    color:#d84d73;
}

.btn.danger {
    background:#fff0f0;
    color:var(--danger);
}

.btn-row {
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}

.layout {
    display:grid;
    grid-template-columns:360px 1fr;
    gap:18px;
    align-items:start;
}

.sidebar, .editor {
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.8);
    border-radius:30px;
    box-shadow:var(--shadow);
}

.sidebar {
    padding:16px;
    max-height:calc(100vh - 126px);
    overflow:auto;
}

.editor {
    padding:24px;
    min-height:calc(100vh - 126px);
}

.calendar {
    background:white;
    border:1px solid var(--border);
    border-radius:24px;
    padding:14px;
    margin-bottom:16px;
}

.calendar-head {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
    font-weight:950;
    color:var(--primary-dark);
}

.cal-grid {
    display:grid;
    grid-template-columns:repeat(7, 1fr);
    gap:5px;
}

.cal-weekday {
    text-align:center;
    color:var(--sub);
    font-size:0.68rem;
    font-weight:900;
    padding-bottom:4px;
}

.cal-day, .cal-empty {
    height:36px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    font-size:0.82rem;
    font-weight:850;
    position:relative;
}

.cal-day {
    cursor:pointer;
    background:#fffef9;
}

.cal-day:hover {
    background:#fff7dc;
}

.cal-day.has-entry {
    background:#fff4b8;
    color:#6b5300;
}

.cal-day.selected {
    background:var(--primary);
    color:var(--text);
}

.cal-day.has-entry.selected {
    background:linear-gradient(135deg, var(--primary), var(--pink));
    color:white;
}

.cal-day.has-entry::after {
    content:"";
    position:absolute;
    bottom:3px;
    width:5px;
    height:5px;
    border-radius:50%;
    background:var(--pink);
}

.cal-day.selected::after {
    background:white;
}

.search-input {
    width:100%;
    border:1px solid var(--border);
    border-radius:16px;
    padding:12px 13px;
    outline:none;
    background:white;
    margin-bottom:12px;
    font-size:0.9rem;
}

.small-title {
    color:var(--sub);
    font-size:0.78rem;
    font-weight:950;
    margin:16px 0 8px;
}

.dump-list {
    display:flex;
    flex-direction:column;
    gap:8px;
}

.dump-item {
    background:white;
    border:1px solid var(--border);
    border-radius:18px;
    padding:12px;
    cursor:pointer;
    display:flex;
    gap:10px;
    align-items:flex-start;
}

.dump-item.active {
    border-color:var(--primary);
    background:#fffdf4;
}

.dump-date-badge {
    width:52px;
    flex-shrink:0;
    background:linear-gradient(135deg, #fff2cc, #ffe0ec);
    color:#b68b0c;
    border-radius:15px;
    padding:8px 4px;
    text-align:center;
    font-weight:950;
    font-size:0.7rem;
    line-height:1.2;
}

.dump-info {
    flex:1;
    min-width:0;
}

.dump-title {
    font-weight:950;
    font-size:0.9rem;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.dump-preview {
    color:var(--sub);
    font-size:0.75rem;
    line-height:1.4;
    margin-top:4px;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
}

.dump-meta {
    color:#bcae8d;
    font-size:0.68rem;
    font-weight:800;
    margin-top:5px;
}

.editor-empty {
    min-height:520px;
    display:grid;
    place-items:center;
    text-align:center;
    color:var(--sub);
    font-weight:850;
    line-height:1.7;
}

.entry-date {
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:#fff9e6;
    color:var(--primary-dark);
    border-radius:999px;
    padding:8px 12px;
    font-size:0.82rem;
    font-weight:950;
    margin-bottom:14px;
}

.writing-timer {
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:18px;
    background:linear-gradient(135deg, #fffaf0, #f4fffc);
    border:2px solid #f2ce63;
    border-radius:24px;
    padding:14px 16px;
    margin-bottom:18px;
    box-shadow:0 8px 20px rgba(212, 163, 28, 0.13);
    transition:background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
}

.writing-timer.finished {
    background:linear-gradient(135deg, #fff2cc, #e9fbf7);
    border-color:#dfa916;
    box-shadow:
        0 0 0 6px rgba(255, 209, 82, 0.25),
        0 12px 28px rgba(212, 163, 28, 0.24);
    animation:timerGlow 1.15s ease-in-out 3;
}

.timer-clock {
    min-width:112px;
    color:#745706;
    background:rgba(255,255,255,0.65);
    border:1px solid rgba(212, 163, 28, 0.24);
    border-radius:17px;
    padding:7px 10px;
    font-size:2rem;
    font-weight:950;
    letter-spacing:0.04em;
    text-align:center;
    font-variant-numeric:tabular-nums;
}

.timer-controls {
    flex:1;
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:8px;
    flex-wrap:wrap;
}

.timer-input-wrap {
    display:flex;
    align-items:center;
    gap:5px;
    color:var(--sub);
    font-size:0.76rem;
    font-weight:900;
}

.timer-input {
    width:58px;
    border:1px solid var(--border);
    border-radius:12px;
    padding:9px 7px;
    outline:none;
    background:white;
    color:var(--text);
    font-size:0.86rem;
    font-weight:900;
    text-align:center;
}

.timer-input:focus {
    border-color:var(--primary);
}

.timer-input:disabled {
    color:var(--sub);
    background:#faf8f1;
}

.timer-presets {
    display:flex;
    gap:5px;
}

.timer-preset {
    border:none;
    border-radius:12px;
    padding:9px 10px;
    background:white;
    color:#8c7538;
    font-size:0.76rem;
    font-weight:900;
    cursor:pointer;
    box-shadow:inset 0 0 0 1px var(--border);
}

.timer-preset:hover {
    background:var(--yellow);
}

.timer-message {
    width:100%;
    color:#8f741c;
    font-size:0.78rem;
    font-weight:900;
    text-align:right;
}

@keyframes timerGlow {
    0%, 100% { transform:scale(1); }
    50% { transform:scale(1.008); }
}

.title-input {
    width:100%;
    border:none;
    outline:none;
    background:transparent;
    color:var(--text);
    font-size:2rem;
    font-weight:950;
    letter-spacing:-0.05em;
    margin-bottom:12px;
}

.content-area {
    width:100%;
    min-height:520px;
    resize:vertical;
    border:1px solid var(--border);
    border-radius:26px;
    padding:20px;
    outline:none;
    background:white;
    color:var(--text);
    line-height:1.75;
    font-size:1rem;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,0.4);
}

.editor-actions {
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    margin-top:14px;
}

.status-wrapper {
    display:flex;
    align-items:center;
    gap:15px;
}

.status {
    color:var(--sub);
    font-size:0.78rem;
    font-weight:850;
}

/* 📊 글자수 레이아웃 스타일 */
.word-counter {
    font-size:0.85rem;
    font-weight:800;
    color:var(--sub);
    display:flex;
    align-items:center;
    gap:10px;
}

.word-counter span strong {
    color:var(--text);
}

.success-badge {
    color:var(--blue);
    font-weight:900;
    animation: bounce 0.5s ease;
}

.challenge-badge {
    color:#b18408;
    font-weight:900;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
}

.empty-small {
    background:white;
    border:1px solid var(--border);
    border-radius:18px;
    padding:18px;
    text-align:center;
    color:var(--sub);
    font-weight:850;
    line-height:1.6;
}

#importMergeFile,
#importOverwriteFile {
    display:none;
}

@media (max-width:900px) {
    .app {
        padding:12px;
    }

    .topbar {
        align-items:flex-start;
        flex-direction:column;
    }

    .logo-icon {
        width:44px;
        height:44px;
        border-radius:14px;
    }

    .layout {
        grid-template-columns:1fr;
    }

    .sidebar {
        max-height:none;
    }

    .editor {
        min-height:auto;
        padding:18px;
    }

    .title-input {
        font-size:1.55rem;
    }

    .writing-timer {
        align-items:stretch;
        flex-direction:column;
    }

    .timer-clock {
        text-align:left;
    }

    .timer-controls {
        justify-content:flex-start;
    }

    .timer-message {
        text-align:left;
    }

    .content-area {
        min-height:360px;
    }
}
</style>
</head>

<body>
<div class="app">
    <header class="topbar">
        <div class="brand">
            <img class="logo-icon" src="./icon.png" alt="Morning Pages 로고">
            <div>
                <div class="logo">Morning <span>Pages</span> ☀️✨</div>
                <div class="sub">매일 아침 눈부신 햇살과 함께 머릿속을 맑게 비워내는 의식</div>
            </div>
        </div>

        <div class="btn-row">
            <button class="btn primary" onclick="createEntry()">＋ 새 아침 생각</button>
            <button class="btn" onclick="exportData()">💾 백업</button>
            <button class="btn merge" onclick="document.getElementById('importMergeFile').click()">🔀 통합</button>
            <button class="btn overwrite" onclick="document.getElementById('importOverwriteFile').click()">📂 불러오기</button>
        </div>
    </header>

    <main class="layout">
        <aside class="sidebar">
            <div class="calendar">
                <div class="calendar-head">
                    <button class="btn" onclick="changeCalendarMonth(-1)">◀</button>
                    <span id="calendarLabel"></span>
                    <button class="btn" onclick="changeCalendarMonth(1)">▶</button>
                </div>
                <div class="cal-grid" id="calendarGrid"></div>
            </div>

            <input class="search-input" id="searchInput" placeholder="아침 일지 검색하기" oninput="renderList()">

            <div class="small-title">Morning Logs</div>
            <div class="dump-list" id="dumpList"></div>
        </aside>

        <section class="editor" id="editor"></section>
    </main>
</div>

<input type="file" id="importMergeFile" accept=".json" onchange="mergeData(event)">
<input type="file" id="importOverwriteFile" accept=".json" onchange="overwriteData(event)">

<script>
const STORAGE_KEY = "MorningPages_v1";

let state = loadState();
let selectedId = state.entries[0]?.id || null;
let calendarDate = new Date();
let selectedCalendarDate = makeDateKey(new Date());
let saveTimer = null;
let writingTimerInterval = null;
let writingTimerRemaining = 10 * 60;
let writingTimerInitial = 10 * 60;
let writingTimerEndAt = null;
let writingTimerRunning = false;
let writingTimerFinished = false;

function loadState() {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");

    if (saved && Array.isArray(saved.entries)) {
        return normalizeState(saved);
    }

    return {
        entries: []
    };
}

function normalizeState(data) {
    return {
        entries: (data.entries || []).map((e, index) => ({
            id: e.id || "entry_" + Date.now() + Math.random(),
            title: e.title || "제목 없는 아침 일지",
            body: e.body || "",
            dateKey: e.dateKey || makeDateKey(new Date(e.createdAt || Date.now())),
            createdAt: e.createdAt || new Date().toISOString(),
            updatedAt: e.updatedAt || null,
            order: Number.isFinite(e.order) ? e.order : index
        }))
    };
}

function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function currentEntry() {
    return state.entries.find(e => e.id === selectedId) || null;
}

function createEntry() {
    const now = new Date();
    const nowIso = now.toISOString();
    const entry = {
        id: "entry_" + Date.now(),
        title: "오늘 아침의 생각",
        body: "",
        dateKey: makeDateKey(now),
        createdAt: nowIso,
        updatedAt: nowIso,
        order: 0
    };

    state.entries.forEach(e => e.order = (e.order || 0) + 1);
    state.entries.unshift(entry);

    selectedId = entry.id;
    selectedCalendarDate = entry.dateKey;
    calendarDate = new Date(now.getFullYear(), now.getMonth(), 1);

    saveState();
    renderAll();
}

function selectEntry(id) {
    selectedId = id;

    const entry = currentEntry();
    if (entry) {
        selectedCalendarDate = entry.dateKey;
        const d = parseDateKey(entry.dateKey);
        calendarDate = new Date(d.getFullYear(), d.getMonth(), 1);
    }

    renderAll();
}

function updateEntry(field, value) {
    const entry = currentEntry();
    if (!entry) return;

    entry[field] = value;
    entry.updatedAt = new Date().toISOString();

    showSaving();
    saveState();
    renderList();
    renderCalendar();

    // ✍️ 본문 내용을 타이핑할 때 실시간 글자수 및 성공 도장을 실시간 업데이트!
    if (field === 'body') {
        updateWordCount(value);
    }
}

// 📐 글자수를 실시간 계산해서 화면에 뿌려주는 함수
function updateWordCount(text) {
    const charCountWithSpace = text.length;
    const charCountWithoutSpace = text.replace(/\s/g, "").length;

    const withSpaceEl = document.getElementById("charWithSpace");
    const withoutSpaceEl = document.getElementById("charWithoutSpace");
    const successWrapEl = document.getElementById("successWrap");

    if (withSpaceEl) withSpaceEl.innerText = charCountWithSpace;
    if (withoutSpaceEl) withoutSpaceEl.innerText = charCountWithoutSpace;

    if (successWrapEl) {
        if (charCountWithSpace >= 2000) {
            successWrapEl.innerHTML = `<span class="success-badge">🎉 2000자 달성 성공!</span>`;
        } else {
            successWrapEl.innerHTML = `<span class="challenge-badge">☀️ 2000자를 향해 글을 써보기 도전!</span>`;
        }
    }
}

function setWritingTimer(minutes, seconds = 0) {
    if (writingTimerRunning) return;

    const totalSeconds = Math.max(0, (minutes * 60) + seconds);
    writingTimerInitial = totalSeconds;
    writingTimerRemaining = totalSeconds;
    writingTimerFinished = false;
    updateWritingTimerDisplay();
}

function syncWritingTimerInputs() {
    if (writingTimerRunning) return;

    const minuteInput = document.getElementById("timerMinutes");
    const secondInput = document.getElementById("timerSeconds");
    if (!minuteInput || !secondInput) return;

    const minutes = Math.max(0, Number.parseInt(minuteInput.value, 10) || 0);
    const seconds = Math.min(59, Math.max(0, Number.parseInt(secondInput.value, 10) || 0));

    secondInput.value = seconds;
    writingTimerInitial = (minutes * 60) + seconds;
    writingTimerRemaining = writingTimerInitial;
    writingTimerFinished = false;
    updateWritingTimerDisplay();
}

function toggleWritingTimer() {
    if (writingTimerRunning) {
        pauseWritingTimer();
        return;
    }

    if (writingTimerRemaining <= 0) {
        syncWritingTimerInputs();
    }

    if (writingTimerRemaining <= 0) {
        alert("타이머 시간을 1초 이상 맞춰줘.");
        return;
    }

    writingTimerRunning = true;
    writingTimerFinished = false;
    writingTimerEndAt = Date.now() + (writingTimerRemaining * 1000);

    clearInterval(writingTimerInterval);
    writingTimerInterval = setInterval(tickWritingTimer, 250);
    updateWritingTimerDisplay();
}

function pauseWritingTimer() {
    if (!writingTimerRunning) return;

    writingTimerRemaining = Math.max(0, Math.ceil((writingTimerEndAt - Date.now()) / 1000));
    writingTimerRunning = false;
    writingTimerEndAt = null;
    clearInterval(writingTimerInterval);
    writingTimerInterval = null;
    updateWritingTimerDisplay();
}

function resetWritingTimer() {
    clearInterval(writingTimerInterval);
    writingTimerInterval = null;
    writingTimerRunning = false;
    writingTimerEndAt = null;
    writingTimerRemaining = writingTimerInitial;
    writingTimerFinished = false;
    updateWritingTimerDisplay();
}

function tickWritingTimer() {
    writingTimerRemaining = Math.max(0, Math.ceil((writingTimerEndAt - Date.now()) / 1000));

    if (writingTimerRemaining <= 0) {
        clearInterval(writingTimerInterval);
        writingTimerInterval = null;
        writingTimerRunning = false;
        writingTimerEndAt = null;
        writingTimerFinished = true;
    }

    updateWritingTimerDisplay();
}

function updateWritingTimerDisplay() {
    const timerCard = document.getElementById("writingTimer");
    const display = document.getElementById("timerDisplay");
    const minuteInput = document.getElementById("timerMinutes");
    const secondInput = document.getElementById("timerSeconds");
    const toggleButton = document.getElementById("timerToggle");
    const message = document.getElementById("timerMessage");

    if (!timerCard || !display) return;

    const minutes = Math.floor(writingTimerRemaining / 60);
    const seconds = writingTimerRemaining % 60;
    display.innerText = `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;

    timerCard.classList.toggle("finished", writingTimerFinished);
    if (minuteInput) {
        minuteInput.value = Math.floor(writingTimerRemaining / 60);
        minuteInput.disabled = writingTimerRunning;
    }
    if (secondInput) {
        secondInput.value = writingTimerRemaining % 60;
        secondInput.disabled = writingTimerRunning;
    }
    if (toggleButton) {
        toggleButton.innerText = writingTimerRunning ? "일시정지" : "시작";
    }
    if (message) {
        message.innerText = writingTimerFinished ? "타이머가 끝났어요. 지금 쓰던 문장까지 천천히 마무리해봐요." : "";
    }
}

function deleteEntry(id) {
    if (!confirm("이 아침 기록을 삭제할까?")) return;

    state.entries = state.entries.filter(e => e.id !== id);

    if (selectedId === id) {
        selectedId = state.entries[0]?.id || null;
    }

    saveState();
    renderAll();
}

function sortedEntries() {
    return [...state.entries].sort((a, b) => {
        return new Date(b.createdAt) - new Date(a.createdAt);
    });
}

function renderList() {
    const keyword = document.getElementById("searchInput").value.trim().toLowerCase();
    const list = document.getElementById("dumpList");

    let entries = sortedEntries();

    if (keyword) {
        entries = entries.filter(e =>
            (e.title || "").toLowerCase().includes(keyword) ||
            (e.body || "").toLowerCase().includes(keyword)
        );
    }

    list.innerHTML = entries.length
        ? entries.map(e => `
            <div class="dump-item ${e.id === selectedId ? "active" : ""}" onclick="selectEntry('${e.id}')">
                <div class="dump-date-badge">
                    ${formatDateShort(e.dateKey)}
                </div>
                <div class="dump-info">
                    <div class="dump-title">${escapeHtml(e.title)}</div>
                    <div class="dump-preview">${escapeHtml(e.body || "아직 기록된 내용이 없어.")}</div>
                    <div class="dump-meta">${e.updatedAt ? "수정됨" : "작성됨"} · ${formatDate(e.updatedAt || e.createdAt)}</div>
                </div>
            </div>
        `).join("")
        : `<div class="empty-small">아직 작성된 아침 일지가 없어.<br>새 아침 생각을 눌러 햇살을 채워봐 ☀️</div>`;
}

function renderEditor() {
    const editor = document.getElementById("editor");
    const entry = currentEntry();

    if (!entry) {
        editor.innerHTML = `
            <div class="editor-empty">
                아직 선택된 아침 일지가 없어 🫧<br>
                “＋ 새 아침 생각”을 눌러 사각사각 적어보자.
            </div>
        `;
        return;
    }

    const bodyText = entry.body || "";
    const charCountWithSpace = bodyText.length;
    const charCountWithoutSpace = bodyText.replace(/\s/g, "").length;
    const isSuccess = charCountWithSpace >= 2000;

    editor.innerHTML = `
        <div class="entry-date">🗓️ ${formatDate(entry.dateKey)}</div>
        <div class="writing-timer ${writingTimerFinished ? "finished" : ""}" id="writingTimer">
            <div class="timer-clock" id="timerDisplay">10:00</div>
            <div class="timer-controls">
                <label class="timer-input-wrap">
                    <input class="timer-input" id="timerMinutes" type="number" min="0" value="10" onchange="syncWritingTimerInputs()">분
                </label>
                <label class="timer-input-wrap">
                    <input class="timer-input" id="timerSeconds" type="number" min="0" max="59" value="0" onchange="syncWritingTimerInputs()">초
                </label>
                <div class="timer-presets">
                    <button class="timer-preset" onclick="setWritingTimer(5)">5분</button>
                    <button class="timer-preset" onclick="setWritingTimer(10)">10분</button>
                    <button class="timer-preset" onclick="setWritingTimer(20)">20분</button>
                </div>
                <button class="btn primary" id="timerToggle" onclick="toggleWritingTimer()">시작</button>
                <button class="btn" onclick="resetWritingTimer()">초기화</button>
                <div class="timer-message" id="timerMessage"></div>
            </div>
        </div>
        <input class="title-input" value="${escapeAttr(entry.title)}" placeholder="오늘 아침의 주제는 무엇인가요?" oninput="updateEntry('title', this.value)">
        <textarea class="content-area" placeholder="눈을 떠서 떠오르는 모든 생각과 흐름을 필터링 없이 솔직하게 털어놓으세요." oninput="updateEntry('body', this.value)">${escapeHtml(bodyText)}</textarea>

        <div class="editor-actions">
            <div class="status-wrapper">
                <div class="status" id="saveStatus">자동 저장됨</div>
                <!-- 📊 공백 포함/제외 실시간 글자수 계산 UI 영역 -->
                <div class="word-counter">
                    <span>공백 포함: <strong id="charWithSpace">${charCountWithSpace}</strong>자</span>
                    <span>공백 제외: <strong id="charWithoutSpace">${charCountWithoutSpace}</strong>자</span>
                    <div id="successWrap" style="display:inline-block; margin-left: 5px;">
                        ${isSuccess
                            ? `<span class="success-badge">🎉 2000자 달성 성공!</span>`
                            : `<span class="challenge-badge">☀️ 2000자를 향해 글을 써보기 도전!</span>`}
                    </div>
                </div>
            </div>
            <div class="btn-row">
                <button class="btn danger" onclick="deleteEntry('${entry.id}')">삭제</button>
            </div>
        </div>
    `;

    updateWritingTimerDisplay();
}

function renderCalendar() {
    const grid = document.getElementById("calendarGrid");
    const y = calendarDate.getFullYear();
    const m = calendarDate.getMonth();

    const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    document.getElementById("calendarLabel").innerText = `${monthNames[m]} ${y}`;

    grid.innerHTML = ["Su","Mo","Tu","We","Th","Fr","Sa"].map(d => `<div class="cal-weekday">${d}</div>`).join("");

    const first = new Date(y, m, 1);
    const last = new Date(y, m + 1, 0);

    for (let i = 0; i < first.getDay(); i++) {
        grid.innerHTML += `<div class="cal-empty"></div>`;
    }

    for (let d = 1; d <= last.getDate(); d++) {
        const dateKey = makeDateKey(new Date(y, m, d));
        const hasEntry = state.entries.some(e => e.dateKey === dateKey);
        const selected = dateKey === selectedCalendarDate;

        grid.innerHTML += `
            <div class="cal-day ${hasEntry ? "has-entry" : ""} ${selected ? "selected" : ""}" onclick="selectDate('${dateKey}')">
                ${d}
            </div>
        `;
    }
}

function selectDate(dateKey) {
    selectedCalendarDate = dateKey;

    const entriesOfDay = sortedEntries().filter(e => e.dateKey === dateKey);

    if (entriesOfDay.length > 0) {
        selectedId = entriesOfDay[0].id;
    } else {
        selectedId = null;
    }

    renderAll();
}

function changeCalendarMonth(step) {
    calendarDate.setMonth(calendarDate.getMonth() + step);
    renderCalendar();
}

function showSaving() {
    clearTimeout(saveTimer);

    const status = document.getElementById("saveStatus");
    if (status) status.innerText = "저장 중...";

    saveTimer = setTimeout(() => {
        const nowStatus = document.getElementById("saveStatus");
        if (nowStatus) nowStatus.innerText = "자동 저장됨";
    }, 500);
}

function exportData() {
    const data = {
        app: "Morning Pages",
        version: 1,
        exportedAt: new Date().toISOString(),
        ...state
    };

    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = `모닝페이지 백업.json`;
    a.click();

    URL.revokeObjectURL(url);
}

function parseImported(parsed) {
    if (!parsed || !Array.isArray(parsed.entries)) return null;
    return normalizeState(parsed);
}

function makeEntryKey(entry) {
    const title = String(entry.title || "").trim().toLowerCase();
    const body = String(entry.body || "").trim().toLowerCase();
    return `${entry.dateKey || ""}::${title}::${body.slice(0, 80)}`;
}

function mergeData(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = e => {
        try {
            const imported = parseImported(JSON.parse(e.target.result));

            if (!imported) {
                alert("통합할 수 있는 백업 파일이 아니야 ㅠㅠ");
                return;
            }

            if (!confirm("현재 기록을 유지하고 백업 파일을 통합할까?")) return;

            const map = new Map();
            state.entries.forEach(entry => map.set(makeEntryKey(entry), entry));

            let added = 0;
            let merged = 0;

            imported.entries.forEach(incoming => {
                const key = makeEntryKey(incoming);
                const existing = map.get(key);

                if (existing) {
                    const incomingNewer = incoming.updatedAt && (!existing.updatedAt || new Date(incoming.updatedAt) > new Date(existing.updatedAt));
                    if (incomingNewer) {
                        existing.title = incoming.title;
                        existing.body = incoming.body;
                        existing.updatedAt = incoming.updatedAt;
                    }
                    merged++;
                } else {
                    state.entries.push(incoming);
                    map.set(key, incoming);
                    added++;
                }
            });

            saveState();
            selectedId = state.entries[0]?.id || null;
            renderAll();

            alert(`통합 완료! 새 기록 ${added}개 추가, 중복 기록 ${merged}개 정리했어.`);
        } catch {
            alert("파일을 통합하는 중 문제가 생겼어 ㅠㅠ");
        }

        event.target.value = "";
    };

    reader.readAsText(file);
}

function overwriteData(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = e => {
        try {
            const imported = parseImported(JSON.parse(e.target.result));

            if (!imported) {
                alert("불러올 수 있는 백업 파일이 아니야 ㅠㅠ");
                return;
            }

            if (!confirm("현재 기록이 백업 파일 내용으로 교체돼. 계속할까?")) return;

            state = imported;
            selectedId = state.entries[0]?.id || null;

            saveState();
            renderAll();

            alert("불러오기 완료!");
        } catch {
            alert("파일을 불러오는 중 문제가 생겼어 ㅠㅠ");
        }

        event.target.value = "";
    };

    reader.readAsText(file);
}

function renderAll() {
    renderCalendar();
    renderList();
    renderEditor();
}

function makeDateKey(date) {
    return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
}

function parseDateKey(dateKey) {
    return new Date(dateKey + "T00:00:00");
}

function formatDate(dateValue) {
    const d = String(dateValue).includes("-") && String(dateValue).length === 10
        ? parseDateKey(dateValue)
        : new Date(dateValue);

    if (isNaN(d.getTime())) return "";
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2, "0")}.${String(d.getDate()).padStart(2, "0")}`;
}

function formatDateShort(dateKey) {
    const d = parseDateKey(dateKey);
    if (isNaN(d.getTime())) return "";
    return `${d.getMonth()+1}.${d.getDate()}`;
}

function escapeHtml(text) {
    return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function escapeAttr(text) {
    return escapeHtml(text).replaceAll("\n", "&#10;");
}

saveState();
renderAll();
</script>
</body>
</html>
