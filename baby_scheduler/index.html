<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>베이비 스케줄러</title>
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://html2canvas.hertzenberg.com/dist/html2canvas.min.js"></script>

    <style>
        :root {
            --bg: #faf9f5;
            --card-bg: #ffffff;
            --sub-bg: #fdfaf2;
            --border: #f0e9d7;
            --text-main: #4a4035;
            --text-sub: #9e8e7c;
            --point: #ffdca3;
            --accent: #ffbca3;
            --mint: #cee5d0;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-main);
        }

        .container {
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
        }

        .card {
            background: var(--card-bg);
            padding: 22px;
            border-radius: 26px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(158, 142, 124, 0.05);
            box-sizing: border-box;
        }

        #edit-view,
        #preview-view {
            width: 100%;
        }

        #preview-view {
            display: none;
        }

        h2 {
            margin-top: 0;
            text-align: center;
            color: var(--text-main);
            font-size: 1.25rem;
            font-weight: bold;
            letter-spacing: -0.5px;
        }

        h3 {
            margin-top: 0;
            font-size: 0.9rem;
            color: var(--text-sub);
            font-weight: bold;
            margin-bottom: 10px;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 13px;
            margin: 8px 0;
            border: 1px solid var(--border);
            border-radius: 14px;
            box-sizing: border-box;
            background: var(--sub-bg);
            font-size: 16px;
            color: var(--text-main);
            transition: 0.2s;
            font-family: inherit;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--accent);
            background: #fff;
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 14px;
            font-weight: bold;
            transition: 0.2s;
            font-size: 0.95rem;
            font-family: inherit;
        }

        .save-btn {
            width: 100%;
            padding: 14px;
            background: var(--text-main);
            color: white;
            margin-top: 5px;
            box-shadow: 0 4px 12px rgba(74, 64, 53, 0.15);
        }

        .save-btn:active {
            background: #332b23;
        }

        .go-preview-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            margin-bottom: 15px;
            box-shadow: 0 4px 12px rgba(255, 188, 163, 0.4);
        }

        .go-preview-btn:active {
            opacity: 0.9;
        }

        .real-download-btn {
            width: 100%;
            padding: 14px;
            background: var(--text-main);
            color: white;
            margin-bottom: 10px;
            box-shadow: 0 4px 12px rgba(74, 64, 53, 0.15);
        }

        .back-edit-btn {
            width: 100%;
            padding: 14px;
            background: var(--sub-bg);
            color: var(--text-main);
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .category-zone {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 15px;
        }

        .cat-btn {
            padding: 9px 13px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: bold;
            color: var(--text-sub);
        }

        .cat-btn.active {
            background: var(--point);
            color: var(--text-main);
            border-color: var(--point);
            box-shadow: 0 4px 10px rgba(255, 220, 163, 0.4);
        }

        .cat-manage-box {
            margin-top: 18px;
            padding-top: 15px;
            border-top: 1px dashed var(--border);
        }

        .cat-manage-form {
            display: flex;
            gap: 6px;
        }

        .cat-manage-form input {
            margin: 0;
            padding: 10px;
            font-size: 0.85rem;
            border-radius: 10px;
            background: var(--bg);
        }

        .add-cat-btn {
            background: var(--text-sub);
            color: white;
            padding: 10px 14px;
            font-size: 0.85rem;
            border-radius: 10px;
            white-space: nowrap;
        }

        .birthday-box {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed var(--border);
        }

        .birthday-box input {
            background: var(--bg);
            margin: 5px 0 0 0;
            font-size: 0.9rem;
            font-weight: bold;
            text-align: center;
        }

        .date-picker-zone {
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
            margin-bottom: 18px;
        }

        .nav-arrow-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: var(--text-sub);
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        .nav-arrow-btn:active {
            background: var(--sub-bg);
        }

        .date-input {
            padding: 9px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            font-size: 0.95rem;
            text-align: center;
            font-weight: bold;
            color: var(--text-main);
            background: var(--card-bg);
            width: 165px;
            margin: 0;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            letter-spacing: -0.3px;
        }

        .today-btn {
            background: var(--mint);
            color: var(--text-main);
            height: 38px;
            padding: 0 14px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: bold;
            box-shadow: 0 2px 6px rgba(206, 229, 208, 0.4);
        }

        .today-btn:active {
            opacity: 0.8;
        }


        .copy-schedule-box {
            background: var(--sub-bg);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 14px;
            margin-top: 14px;
            box-shadow: 0 4px 12px rgba(158, 142, 124, 0.035);
        }

        .copy-schedule-title {
            font-size: 0.9rem;
            color: var(--text-main);
            font-weight: 800;
            margin-bottom: 10px;
            text-align: center;
        }

        .copy-schedule-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .copy-date-input {
            flex: 1;
            margin: 0;
            padding: 11px 10px;
            background: var(--sub-bg);
            font-size: 0.9rem;
            text-align: center;
            font-weight: 700;
        }

        .copy-schedule-btn {
            flex: 1;
            padding: 12px 10px;
            background: var(--mint);
            color: var(--text-main);
            box-shadow: 0 4px 12px rgba(206, 229, 208, 0.4);
            white-space: nowrap;
        }

        .copy-schedule-btn:active {
            opacity: 0.85;
        }

        #capture-area {
            background: #ffffff;
            padding: 25px;
            border-radius: 26px;
            border: 1px solid var(--border);
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(158, 142, 124, 0.04);
        }

        .schedule-title {
            text-align: center;
            margin-bottom: 16px;
            color: var(--text-main);
            font-size: 1.1rem;
            font-weight: bold;
            border-bottom: 2px dashed var(--point);
            padding-bottom: 14px;
            letter-spacing: -0.5px;
        }

        .dday-container {
            display: block;
            text-align: center;
            font-size: 0.95rem;
            font-weight: bold;
            color: var(--accent);
            margin-top: 6px;
        }

        .title-dday {
            font-weight: 800;
        }

        .title-age {
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-left: 6px;
            font-weight: 600;
        }

        .schedule-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .schedule-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding-bottom: 14px;
            border-bottom: 1px solid #faf9f5;
            position: relative;
        }

        .schedule-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .item-emoji {
            font-size: 1.4rem;
            min-width: 30px;
            text-align: center;
            margin-top: 2px;
        }

        .item-content {
            flex: 1;
            min-width: 0;
        }

        .item-time-row {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 4px;
            flex-wrap: wrap;
        }

        .inline-time-input {
            font-size: 0.85rem;
            color: var(--text-sub);
            font-weight: bold;
            border: none;
            background: transparent;
            padding: 2px 0;
            width: 45px;
            margin: 0;
            text-align: center;
        }

        .inline-time-input:focus {
            background: var(--sub-bg);
            outline: none;
            border-radius: 4px;
        }

        .inline-ampm-select {
            font-size: 0.82rem;
            color: var(--text-sub);
            font-weight: bold;
            border: 1px solid var(--border);
            background: #fff;
            padding: 2px 4px;
            border-radius: 6px;
            width: auto;
            margin: 0;
            cursor: pointer;
        }

        .inline-ampm-select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .item-time-print-text {
            font-size: 0.85rem;
            color: var(--text-sub);
            font-weight: bold;
            display: none;
        }

        .item-text {
            font-size: 0.95rem;
            color: var(--text-main);
            margin: 0;
            width: 100%;
            border: none;
            background: transparent;
            resize: none;
            padding: 0;
            line-height: 1.5;
            word-break: break-word;
            white-space: pre-wrap;
            font-family: inherit;
        }

        textarea.item-text {
            overflow: hidden;
        }

        .item-text:focus {
            background: var(--sub-bg);
            outline: none;
            border-radius: 4px;
        }

        .delete-btn {
            background: none;
            font-size: 1rem;
            cursor: pointer;
            opacity: 0.25;
            padding: 0;
            margin-left: 5px;
            align-self: center;
        }

        .delete-btn:hover {
            opacity: 0.8;
        }

        .cat-select {
            font-size: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: #fff;
            padding: 2px 4px;
            color: var(--text-sub);
            width: auto;
            margin: 0;
            font-weight: bold;
        }

        .backup-zone {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
            padding: 15px;
            background: var(--card-bg);
            border-radius: 18px;
            border: 1px solid var(--border);
            width: 100%;
            box-sizing: border-box;
        }

        .backup-btn {
            flex: 1;
            font-size: 0.75rem;
            padding: 10px 5px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: white;
            cursor: pointer;
            font-weight: bold;
            white-space: nowrap;
            color: var(--text-sub);
        }

        .backup-btn:hover {
            background: var(--sub-bg);
        }

        .preview-top-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
        }

        .preview-guide {
            font-size: 0.78rem;
            color: var(--text-sub);
            text-align: center;
            line-height: 1.5;
            margin: 0 0 14px 0;
        }

        #preview-capture-container {
            width: 100%;
            display: flex;
            justify-content: center;
            overflow-x: auto;
            padding-bottom: 16px;
        }

        .capture-preset-wrapper {
            width: 430px;
            min-height: 932px;
            background: linear-gradient(to bottom, #faf9f5 0%, #fffdf8 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 24px;
            box-sizing: border-box;
            border-radius: 38px;
            overflow: hidden;
        }

        .capture-preset-wrapper #capture-area {
            width: 100%;
            box-shadow: 0 10px 30px rgba(158, 142, 124, 0.06);
        }

        .capture-only-time {
            display: inline-block;
            font-size: 0.85rem;
            color: var(--text-sub);
            font-weight: bold;
            margin-right: 8px;
        }

        .empty-schedule-message {
            text-align: center;
            color: var(--text-sub);
            font-size: 0.9rem;
            margin: 20px 0;
        }

        @media (max-width: 520px) {
            body {
                padding: 14px;
            }

            .card {
                padding: 20px;
            }

            .date-picker-zone {
                gap: 6px;
            }

            .date-input {
                width: 145px;
                font-size: 0.9rem;
                padding-left: 8px;
                padding-right: 8px;
            }

            .today-btn {
                padding: 0 10px;
            }


            .copy-schedule-controls {
                flex-direction: column;
            }

            .copy-date-input,
            .copy-schedule-btn {
                width: 100%;
            }

            .capture-preset-wrapper {
                width: 390px;
                min-height: 844px;
                padding: 18px;
                border-radius: 32px;
            }

            .preview-top-buttons {
                gap: 8px;
            }

            .real-download-btn,
            .back-edit-btn {
                font-size: 0.85rem;
                padding: 13px 8px;
            }
        }

        @media (max-width: 420px) {
            .capture-preset-wrapper {
                width: 360px;
                min-height: 780px;
                padding: 16px;
            }
        }
    </style>
</head>

<body>
<div class="container">

    <div id="edit-view">
        <div class="card">
            <h2>👶 베이비 스케줄러</h2>

            <input type="text" id="scheduleMemo" placeholder="내용을 입력하세요 (예: 잠, 이유식 50ml)">

            <h3>카테고리 선택</h3>
            <div class="category-zone" id="categoryBtns"></div>

            <button class="save-btn" onclick="saveSchedule()">즉시 기록하기</button>

            <div class="copy-schedule-box">
                <div class="copy-schedule-title">📋 다른 날 기록 가져오기</div>
                <div class="copy-schedule-controls">
                    <input type="date" id="copySourceDate" class="copy-date-input">
                    <button class="copy-schedule-btn" onclick="copySchedulesFromSelectedDate()">기록 복사하기</button>
                </div>
            </div>

            <div class="cat-manage-box">
                <h3>➕ 새 카테고리 종류 추가</h3>
                <div class="cat-manage-form">
                    <input type="text" id="newCatEmoji" placeholder="이모지 (🍼)" style="width: 25%;">
                    <input type="text" id="newCatName" placeholder="이름 (수유)" style="width: 55%;">
                    <button class="add-cat-btn" onclick="addCategory()">추가</button>
                </div>
            </div>

            <div class="birthday-box">
                <h3>👶 아기 생일 설정 (YYYY/MM/DD)</h3>
                <input type="text" id="babyBirthDate" placeholder="예: 2025/07/23" maxlength="10" oninput="formatBirthInput(this)" onchange="saveBirthDate()">
            </div>
        </div>

        <div class="date-picker-zone">
            <button class="nav-arrow-btn" onclick="changeViewDate(-1)">◀</button>
            <input type="date" id="viewDate" class="date-input" onchange="displaySchedules()">
            <button class="nav-arrow-btn" onclick="changeViewDate(1)">▶</button>
            <button class="today-btn" onclick="goToday()">Today</button>
        </div>


        <button class="go-preview-btn" onclick="showPreviewView()">📸 스케줄 이미지로 다운받기</button>

        <div id="capture-area">
            <div class="schedule-title" id="capture-title">스케줄</div>
            <div class="schedule-list" id="scheduleList"></div>
        </div>

        <br>

        <div class="backup-zone">
            <button class="backup-btn" onclick="exportBabyData()">💾 백업</button>
            <button class="backup-btn" onclick="document.getElementById('mergeBabyFile').click()">🔄 통합</button>
            <button class="backup-btn" onclick="document.getElementById('importBabyFile').click()">📂 불러오기</button>

            <input type="file" id="mergeBabyFile" style="display:none;" accept=".json" onchange="mergeBabyData(event)">
            <input type="file" id="importBabyFile" style="display:none;" accept=".json" onchange="importBabyData(event)">
        </div>
    </div>

    <div id="preview-view">
        <div class="preview-top-buttons">
            <button class="back-edit-btn" onclick="hidePreviewView()" style="flex: 1; margin-bottom: 0;">⬅️ 돌아가기</button>
            <button class="real-download-btn" id="downloadImageBtn" onclick="executeDownload()" style="flex: 1.5; margin-bottom: 0;">💾 이미지 저장</button>
        </div>

        <p class="preview-guide">
            맥북/PC에서는 PNG 파일로 다운로드돼요.<br>
            아이폰에서는 공유창이 뜨면 “이미지 저장”을 눌러 사진앱에 저장해줘요.
        </p>

        <div id="preview-capture-container"></div>
    </div>

</div>

<script>
    let categories = JSON.parse(localStorage.getItem('babyCategories')) || [
        { emoji: '💤', name: '잠' },
        { emoji: '🍼', name: '수유' },
        { emoji: '🥣', name: '이유식' },
        { emoji: '💩', name: '배변' }
    ];

    let selectedCategoryIndex = 0;
    let lastViewDateForCopyDefault = "";

    window.onload = () => {
        const savedBirth = localStorage.getItem('babyBirthDate');
        if (savedBirth) {
            document.getElementById('babyBirthDate').value = savedBirth;
        }

        renderCategories();
        goToday();
    };

    function formatBirthInput(obj) {
        let val = obj.value.replace(/[^0-9]/g, '');
        let len = val.length;

        if (len >= 5 && len <= 6) {
            obj.value = val.substring(0, 4) + '/' + val.substring(4);
        } else if (len >= 7) {
            obj.value = val.substring(0, 4) + '/' + val.substring(4, 6) + '/' + val.substring(6, 8);
        } else {
            obj.value = val;
        }
    }

    function convertTo12HourFormat(time24) {
        if (!time24 || !time24.includes(':')) return time24;

        let [hours, minutes] = time24.split(':');
        hours = parseInt(hours, 10);

        if (Number.isNaN(hours)) return time24;

        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12;
        hours = hours ? hours : 12;

        return `${hours}:${minutes} ${ampm}`;
    }

    function convertTo24HourFormat(time12) {
        if (!time12) return '';

        let str = String(time12).toUpperCase().trim();

        if (!str.includes('AM') && !str.includes('PM')) {
            const parts = str.split(':');
            if (parts.length === 2) {
                return `${String(parts[0]).padStart(2, '0')}:${String(parts[1]).padStart(2, '0')}`;
            }
            return str;
        }

        const ampm = str.includes('PM') ? 'PM' : 'AM';
        let cleanTime = str.replace('AM', '').replace('PM', '').trim();
        let [hours, minutes] = cleanTime.split(':');

        hours = parseInt(hours, 10);
        minutes = minutes || '00';

        if (Number.isNaN(hours)) return str;

        if (ampm === 'PM' && hours < 12) hours += 12;
        if (ampm === 'AM' && hours === 12) hours = 0;

        return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
    }

    function saveBirthDate() {
        const birthVal = document.getElementById('babyBirthDate').value;
        const regex = /^\d{4}\/\d{2}\/\d{2}$/;

        if (birthVal && !regex.test(birthVal)) {
            alert("올바른 포맷(YYYY/MM/DD)으로 입력해줘 바니!");
            return;
        }

        localStorage.setItem('babyBirthDate', birthVal);
        displaySchedules();
    }

    function getDDayString(targetDateStr) {
        let birthStr = localStorage.getItem('babyBirthDate');
        if (!birthStr || !targetDateStr) return "";

        birthStr = birthStr.replace(/\//g, '-');

        const birth = new Date(birthStr + "T00:00:00");
        const target = new Date(targetDateStr + "T00:00:00");

        if (isNaN(birth.getTime())) return "";

        const diffTime = target.getTime() - birth.getTime();
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

        let ddaySection = "";
        let ageSection = "";

        if (diffDays >= 0) {
            ddaySection = `<span class="title-dday">D+${diffDays + 1}</span>`;

            let start = new Date(birth);
            let months = 0;

            while (true) {
                let nextMonth = new Date(start);
                nextMonth.setMonth(nextMonth.getMonth() + 1);

                if (nextMonth > target) break;

                start = nextMonth;
                months++;
            }

            const remTime = target.getTime() - start.getTime();
            const remDays = Math.floor(remTime / (1000 * 60 * 60 * 24));

            if (months === 0 && remDays === 0) {
                ageSection = `<span class="title-age">(태어난 당일)</span>`;
            } else if (months === 0) {
                ageSection = `<span class="title-age">(${remDays}일)</span>`;
            } else if (remDays === 0) {
                ageSection = `<span class="title-age">(${months}개월)</span>`;
            } else {
                ageSection = `<span class="title-age">(${months}개월 ${remDays}일)</span>`;
            }
        } else {
            ddaySection = `<span class="title-dday">D${diffDays}</span>`;
            ageSection = `<span class="title-age">(출생 전)</span>`;
        }

        return `<span class="dday-container">${ddaySection}${ageSection}</span>`;
    }

    function goToday() {
        const today = new Date();
        const todayStr = getLocalDateString(today);

        document.getElementById('viewDate').value = todayStr;

        renderCategories();
        displaySchedules();
    }

    function getLocalDateString(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');

        return `${y}-${m}-${d}`;
    }

    function renderCategories() {
        const btnZone = document.getElementById('categoryBtns');

        btnZone.innerHTML = categories.map((cat, idx) => {
            let activeClass = idx === selectedCategoryIndex ? 'active' : '';
            return `<button class="cat-btn ${activeClass}" onclick="selectCategory(${idx})">${escapeHtml(cat.emoji)} ${escapeHtml(cat.name)}</button>`;
        }).join('');

        localStorage.setItem('babyCategories', JSON.stringify(categories));
    }

    function selectCategory(idx) {
        selectedCategoryIndex = idx;
        renderCategories();
    }

    function addCategory() {
        const emojiInput = document.getElementById('newCatEmoji');
        const nameInput = document.getElementById('newCatName');

        if (!emojiInput.value.trim() || !nameInput.value.trim()) {
            alert("이모지와 이름을 모두 입력해줘!");
            return;
        }

        categories.push({
            emoji: emojiInput.value.trim(),
            name: nameInput.value.trim()
        });

        selectedCategoryIndex = categories.length - 1;

        emojiInput.value = '';
        nameInput.value = '';

        renderCategories();
        displaySchedules();

        alert("새로운 카테고리가 등록되었어요 🌟");
    }

    function changeViewDate(days) {
        const dateInput = document.getElementById('viewDate');
        if (!dateInput.value) return;

        const current = new Date(dateInput.value + 'T00:00:00');
        current.setDate(current.getDate() + days);

        dateInput.value = getLocalDateString(current);
        displaySchedules();
    }


    function getPreviousDateString(dateValue) {
        if (!dateValue) return getLocalDateString(new Date());

        const baseDate = new Date(dateValue + 'T00:00:00');
        baseDate.setDate(baseDate.getDate() - 1);

        return getLocalDateString(baseDate);
    }

    function syncCopySourceDateDefault() {
        const viewDateVal = document.getElementById('viewDate').value;
        const copyInput = document.getElementById('copySourceDate');

        if (!viewDateVal || !copyInput) return;

        if (lastViewDateForCopyDefault !== viewDateVal) {
            copyInput.value = getPreviousDateString(viewDateVal);
            lastViewDateForCopyDefault = viewDateVal;
        }
    }

    function copySchedulesFromSelectedDate() {
        const viewDateVal = document.getElementById('viewDate').value;
        const sourceDateVal = document.getElementById('copySourceDate').value;

        if (!viewDateVal) {
            alert("먼저 붙여넣을 날짜를 선택해줘!");
            return;
        }

        if (!sourceDateVal) {
            alert("가져올 기록 날짜를 선택해줘!");
            return;
        }

        if (sourceDateVal === viewDateVal) {
            alert("같은 날짜 기록은 같은 날짜로 복사할 수 없어 ㅠㅠ");
            return;
        }

        let allLogs = JSON.parse(localStorage.getItem('babySchedules') || '{}');
        const sourceLogs = allLogs[sourceDateVal] || [];

        if (sourceLogs.length === 0) {
            alert("선택한 날짜에 복사할 기록이 없어 ㅠㅠ");
            return;
        }

        const targetLogs = allLogs[viewDateVal] || [];

        if (targetLogs.length > 0) {
            const ok = confirm(`현재 날짜에 이미 ${targetLogs.length}개의 기록이 있어. 선택한 날짜의 ${sourceLogs.length}개 기록을 추가로 붙여넣을까?`);
            if (!ok) return;
        } else {
            const ok = confirm(`선택한 날짜의 ${sourceLogs.length}개 기록을 현재 날짜로 복사할까?`);
            if (!ok) return;
        }

        const copiedLogs = sourceLogs.map((log, index) => ({
            ...log,
            id: Date.now() + index + Math.floor(Math.random() * 1000),
            memo: log.memo || '',
            time: log.time || '',
            categoryName: log.categoryName || '기타'
        }));

        allLogs[viewDateVal] = [...targetLogs, ...copiedLogs];
        localStorage.setItem('babySchedules', JSON.stringify(allLogs));

        displaySchedules();
        alert(`${copiedLogs.length}개의 기록을 복사해서 붙여넣었어! 📋`);
    }


    function saveSchedule() {
        const memoInput = document.getElementById('scheduleMemo');

        if (!memoInput.value.trim()) {
            alert("내용을 입력해주세요!");
            return;
        }

        const now = new Date();
        const viewDateVal = document.getElementById('viewDate').value;

        const rawTimeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        const timeStr = convertTo12HourFormat(rawTimeStr);

        let matchedIndex = selectedCategoryIndex;

        categories.forEach((cat, idx) => {
            if (memoInput.value.includes(cat.name)) {
                matchedIndex = idx;
            }
        });

        const newLog = {
            id: Date.now(),
            time: timeStr,
            categoryName: categories[matchedIndex].name,
            memo: memoInput.value.trim()
        };

        let allLogs = JSON.parse(localStorage.getItem('babySchedules') || '{}');

        if (!allLogs[viewDateVal]) {
            allLogs[viewDateVal] = [];
        }

        allLogs[viewDateVal].push(newLog);

        localStorage.setItem('babySchedules', JSON.stringify(allLogs));

        memoInput.value = '';

        displaySchedules();
    }

    function getSortedDayLogs(dateValue) {
        const allLogs = JSON.parse(localStorage.getItem('babySchedules') || '{}');
        const dayLogs = allLogs[dateValue] || [];

        return [...dayLogs].sort((a, b) => {
            let timeA = convertTo24HourFormat(a.time);
            let timeB = convertTo24HourFormat(b.time);
            return timeA.localeCompare(timeB);
        });
    }

    function displaySchedules() {
        const viewDateVal = document.getElementById('viewDate').value;
        if (!viewDateVal) return;

        syncCopySourceDateDefault();

        const d = viewDateVal.split('-');
        const ddayHtml = getDDayString(viewDateVal);

        document.getElementById('capture-title').innerHTML = `
            <div>${d[0]}년 ${d[1]}월 ${d[2]}일 스케줄</div>
            ${ddayHtml}
        `;

        const dayLogs = getSortedDayLogs(viewDateVal);
        const listZone = document.getElementById('scheduleList');

        if (dayLogs.length === 0) {
            listZone.innerHTML = `<p class="empty-schedule-message">기록된 아기 스케줄이 비어있어요 🧸</p>`;
            return;
        }

        const ampmOpts = ['AM', 'PM'];

        listZone.innerHTML = dayLogs.map((log) => {
            const catObj = categories.find(c => c.name === log.categoryName) || { emoji: '✨', name: log.categoryName || '기타' };

            const catOptions = categories.map(c =>
                `<option value="${escapeAttr(c.name)}" ${c.name === log.categoryName ? 'selected' : ''}>${escapeHtml(c.emoji)} ${escapeHtml(c.name)}</option>`
            ).join('');

            const displayTime = String(log.time || '').includes('M') ? log.time : convertTo12HourFormat(log.time);

            let cleanTime = String(displayTime).replace('AM','').replace('PM','').trim();
            let currAmpm = String(displayTime).includes('PM') ? 'PM' : 'AM';

            const inlineAmpmHtml = ampmOpts.map(o => `<option value="${o}" ${o === currAmpm ? 'selected' : ''}>${o}</option>`).join('');

            return `
                <div class="schedule-item">
                    <div class="item-emoji">${escapeHtml(catObj.emoji)}</div>
                    <div class="item-content">
                        <div class="item-time-row">
                            <span class="item-time-print-text">${escapeHtml(displayTime)}</span>

                            <input type="text" class="inline-time-input" value="${escapeAttr(cleanTime)}" onchange="updateInlineTimeStr(${log.id}, this.value)">

                            <select class="inline-ampm-select" onchange="updateInlineAmpm(${log.id}, this.value)">
                                ${inlineAmpmHtml}
                            </select>

                            <select class="cat-select" onchange="updateInline(${log.id}, 'categoryName', this.value)">
                                ${catOptions}
                            </select>
                        </div>

                        <textarea class="item-text" rows="1" onchange="updateInline(${log.id}, 'memo', this.value)" oninput="autoResizeTextarea(this)">${escapeHtml(log.memo)}</textarea>
                    </div>

                    <button class="delete-btn" onclick="deleteSchedule(${log.id})">🗑️</button>
                </div>
            `;
        }).join('');

        document.querySelectorAll('.item-text').forEach(autoResizeTextarea);
    }

    function autoResizeTextarea(el) {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
    }

    function updateInlineTimeStr(id, newTimeStr) {
        const viewDateVal = document.getElementById('viewDate').value;
        let allLogs = JSON.parse(localStorage.getItem('babySchedules') || '{}');
        let dayLogs = allLogs[viewDateVal] || [];

        dayLogs = dayLogs.map(log => {
            if (Number(log.id) === Number(id)) {
                let currentAmpm = String(log.time || '').includes('PM') ? 'PM' : 'AM';
                log.time = `${newTimeStr.trim()} ${currentAmpm}`;
            }
            return log;
        });

        allLogs[viewDateVal] = dayLogs;
        localStorage.setItem('babySchedules', JSON.stringify(allLogs));
        displaySchedules();
    }

    function updateInlineAmpm(id, newAmpm) {
        const viewDateVal = document.getElementById('viewDate').value;
        let allLogs = JSON.parse(localStorage.getItem('babySchedules') || '{}');
        let dayLogs = allLogs[viewDateVal] || [];

        dayLogs = dayLogs.map(log => {
            if (Number(log.id) === Number(id)) {
                let cleanTime = String(log.time || '').replace('AM','').replace('PM','').trim();
                log.time = `${cleanTime} ${newAmpm}`;
            }
            return log;
        });

        allLogs[viewDateVal] = dayLogs;
        localStorage.setItem('babySchedules', JSON.stringify(allLogs));
        displaySchedules();
    }

    function updateInline(id, field, value) {
        const viewDateVal = document.getElementById('viewDate').value;
        let allLogs = JSON.parse(localStorage.getItem('babySchedules') || '{}');
        let dayLogs = allLogs[viewDateVal] || [];

        dayLogs = dayLogs.map(log => {
            if (Number(log.id) === Number(id)) {
                log[field] = value;
            }
            return log;
        });

        allLogs[viewDateVal] = dayLogs;
        localStorage.setItem('babySchedules', JSON.stringify(allLogs));
        displaySchedules();
    }

    function deleteSchedule(id) {
        if (!confirm("이 일정을 타임라인에서 삭제할까요?")) return;

        const viewDateVal = document.getElementById('viewDate').value;
        let allLogs = JSON.parse(localStorage.getItem('babySchedules') || '{}');
        let dayLogs = allLogs[viewDateVal] || [];

        allLogs[viewDateVal] = dayLogs.filter(log => Number(log.id) !== Number(id));

        localStorage.setItem('babySchedules', JSON.stringify(allLogs));
        displaySchedules();
    }

    function createPreviewScheduleElement() {
        const viewDateVal = document.getElementById('viewDate').value;
        const d = viewDateVal.split('-');
        const ddayHtml = getDDayString(viewDateVal);
        const dayLogs = getSortedDayLogs(viewDateVal);

        const wrapper = document.createElement('div');
        wrapper.className = 'capture-preset-wrapper';
        wrapper.id = 'capture-preset-target';

        const captureArea = document.createElement('div');
        captureArea.id = 'capture-area';

        const title = document.createElement('div');
        title.className = 'schedule-title';
        title.innerHTML = `
            <div>${d[0]}년 ${d[1]}월 ${d[2]}일 스케줄</div>
            ${ddayHtml}
        `;

        const list = document.createElement('div');
        list.className = 'schedule-list';

        if (dayLogs.length === 0) {
            const empty = document.createElement('p');
            empty.className = 'empty-schedule-message';
            empty.textContent = '기록된 아기 스케줄이 비어있어요 🧸';
            list.appendChild(empty);
        } else {
            dayLogs.forEach(log => {
                const catObj = categories.find(c => c.name === log.categoryName) || { emoji: '✨', name: log.categoryName || '기타' };
                const displayTime = String(log.time || '').includes('M') ? log.time : convertTo12HourFormat(log.time);

                const item = document.createElement('div');
                item.className = 'schedule-item';

                const emoji = document.createElement('div');
                emoji.className = 'item-emoji';
                emoji.textContent = catObj.emoji;

                const content = document.createElement('div');
                content.className = 'item-content';

                const timeRow = document.createElement('div');
                timeRow.className = 'item-time-row';

                const time = document.createElement('span');
                time.className = 'capture-only-time';
                time.textContent = displayTime;

                const memo = document.createElement('div');
                memo.className = 'item-text';
                memo.textContent = log.memo || '';

                timeRow.appendChild(time);
                content.appendChild(timeRow);
                content.appendChild(memo);

                item.appendChild(emoji);
                item.appendChild(content);

                list.appendChild(item);
            });
        }

        captureArea.appendChild(title);
        captureArea.appendChild(list);
        wrapper.appendChild(captureArea);

        return wrapper;
    }

    function showPreviewView() {
        try {
            const container = document.getElementById('preview-capture-container');
            container.innerHTML = '';

            const previewElement = createPreviewScheduleElement();
            container.appendChild(previewElement);

            document.getElementById('edit-view').style.display = 'none';
            document.getElementById('preview-view').style.display = 'block';

            window.scrollTo(0, 0);
        } catch (err) {
            console.error(err);
            alert("미리보기를 만드는 중 문제가 생겼어 ㅠㅠ");
        }
    }

    function hidePreviewView() {
        document.getElementById('preview-view').style.display = 'none';
        document.getElementById('edit-view').style.display = 'block';

        const container = document.getElementById('preview-capture-container');
        container.innerHTML = '';

        displaySchedules();
    }

    function ensureHtml2CanvasLoaded() {
        if (window.html2canvas) {
            return Promise.resolve();
        }

        const sources = [
            "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js",
            "https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js",
            "https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js",
            "https://html2canvas.hertzenberg.com/dist/html2canvas.min.js"
        ];

        function loadScript(index) {
            return new Promise((resolve, reject) => {
                if (window.html2canvas) {
                    resolve();
                    return;
                }

                if (index >= sources.length) {
                    reject(new Error("html2canvas load failed"));
                    return;
                }

                const existing = document.querySelector(`script[data-html2canvas-loader="${index}"]`);
                if (existing) {
                    existing.addEventListener('load', () => resolve());
                    existing.addEventListener('error', () => loadScript(index + 1).then(resolve).catch(reject));
                    return;
                }

                const script = document.createElement('script');
                script.src = sources[index];
                script.async = true;
                script.dataset.html2canvasLoader = String(index);

                script.onload = () => {
                    if (window.html2canvas) {
                        resolve();
                    } else {
                        loadScript(index + 1).then(resolve).catch(reject);
                    }
                };

                script.onerror = () => {
                    script.remove();
                    loadScript(index + 1).then(resolve).catch(reject);
                };

                document.head.appendChild(script);
            });
        }

        return loadScript(0);
    }

    async function executeDownload() {
        const target = document.getElementById('capture-preset-target');
        const downloadBtn = document.getElementById('downloadImageBtn');

        if (!target) {
            alert("미리보기 화면을 먼저 열어줘!");
            return;
        }

        try {
            downloadBtn.disabled = true;
            downloadBtn.textContent = "이미지 저장 기능 준비 중...";

            await ensureHtml2CanvasLoaded();

            downloadBtn.textContent = "이미지 만드는 중...";

            await new Promise(resolve => setTimeout(resolve, 250));

            const canvas = await html2canvas(target, {
                backgroundColor: "#faf9f5",
                scale: 2,
                useCORS: true,
                allowTaint: true,
                logging: false,
                scrollX: 0,
                scrollY: 0,
                windowWidth: document.documentElement.clientWidth,
                windowHeight: document.documentElement.clientHeight
            });

            const fileName = `${document.getElementById('viewDate').value}_스케줄.png`;

            canvas.toBlob(async function(blob) {
                if (!blob) {
                    alert("이미지 파일을 만드는 데 실패했어 ㅠㅠ");
                    downloadBtn.disabled = false;
                    downloadBtn.textContent = "💾 이미지 저장";
                    return;
                }

                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

                if (isIOS && navigator.share) {
                    const file = new File([blob], fileName, { type: "image/png" });

                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        try {
                            await navigator.share({
                                files: [file],
                                title: "베이비 스케줄"
                            });

                            downloadBtn.disabled = false;
                            downloadBtn.textContent = "💾 이미지 저장";
                            return;
                        } catch (shareErr) {
                            console.warn("공유창이 취소되었거나 실패했어요.", shareErr);
                        }
                    }
                }

                const imageUrl = URL.createObjectURL(blob);

                const link = document.createElement('a');
                link.href = imageUrl;
                link.download = fileName;
                link.style.display = 'none';

                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                setTimeout(() => {
                    URL.revokeObjectURL(imageUrl);
                }, 3000);

                downloadBtn.disabled = false;
                downloadBtn.textContent = "💾 이미지 저장";

            }, "image/png");

        } catch (err) {
            console.error(err);

            if (String(err && err.message || '').includes('html2canvas load failed')) {
                alert("이미지 저장 기능을 불러오지 못했어 ㅠㅠ 인터넷이 연결된 상태에서 다시 열거나, GitHub Pages 주소로 열어줘!");
            } else {
                alert("이미지 저장 중 문제가 생겼어 ㅠㅠ 미리보기는 보이면, 화면 캡처로 먼저 저장해도 돼!");
            }

            downloadBtn.disabled = false;
            downloadBtn.textContent = "💾 이미지 저장";
        }
    }

    function exportBabyData() {
        const logs = localStorage.getItem('babySchedules') || '{}';

        if (logs === '{}') {
            alert("백업할 데이터가 비어있어요!");
            return;
        }

        const data = JSON.stringify({
            schedules: JSON.parse(logs),
            categories: categories,
            babyBirthDate: localStorage.getItem('babyBirthDate') || ''
        }, null, 2);

        const blob = new Blob([data], { type: "application/json" });
        const url = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = url;
        a.download = `베이비스케줄 백업_phone.json`;
        a.click();

        URL.revokeObjectURL(url);
    }

    function mergeBabyData(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();

        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                let currentSchedules = JSON.parse(localStorage.getItem('babySchedules') || '{}');

                let importedSchedules = imported.schedules || {};

                for (let date in importedSchedules) {
                    if (!currentSchedules[date]) {
                        currentSchedules[date] = [];
                    }

                    const combined = [...importedSchedules[date], ...currentSchedules[date]];
                    currentSchedules[date] = Array.from(new Map(combined.map(item => [item.id, item])).values());
                }

                localStorage.setItem('babySchedules', JSON.stringify(currentSchedules));

                if (imported.categories) {
                    imported.categories.forEach(impCat => {
                        if (!categories.some(c => c.name === impCat.name)) {
                            categories.push(impCat);
                        }
                    });

                    localStorage.setItem('babyCategories', JSON.stringify(categories));
                }

                if (imported.babyBirthDate && !localStorage.getItem('babyBirthDate')) {
                    localStorage.setItem('babyBirthDate', imported.babyBirthDate);
                    document.getElementById('babyBirthDate').value = imported.babyBirthDate;
                }

                renderCategories();
                displaySchedules();

                alert("기존 스케줄에 새로운 백업 데이터를 병합했어! 🔋");
            } catch (err) {
                alert("파일 형식을 다시 확인해주세요 ㅠㅠ");
            }
        };

        reader.readAsText(file);
        event.target.value = '';
    }

    function importBabyData(event) {
        const file = event.target.files[0];
        if (!file) return;

        if (!confirm("기존의 스케줄 내역이 전부 사라지고 새로 불러와져요. 진행할까요?")) {
            event.target.value = '';
            return;
        }

        const reader = new FileReader();

        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);

                if (imported.schedules) {
                    localStorage.setItem('babySchedules', JSON.stringify(imported.schedules));
                } else {
                    localStorage.setItem('babySchedules', JSON.stringify(imported));
                }

                if (imported.categories) {
                    categories = imported.categories;
                    localStorage.setItem('babyCategories', JSON.stringify(categories));
                }

                if (imported.babyBirthDate) {
                    localStorage.setItem('babyBirthDate', imported.babyBirthDate);
                    document.getElementById('babyBirthDate').value = imported.babyBirthDate;
                }

                renderCategories();
                displaySchedules();

                alert("스케줄 데이터 전체 복구 성공! 🔋");
            } catch (err) {
                alert("파일 형식을 확인해주세요 ㅠㅠ");
            }
        };

        reader.readAsText(file);
        event.target.value = '';
    }

    function escapeHtml(text) {
        return String(text || '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }

    function escapeAttr(text) {
        return escapeHtml(text).replaceAll('`', '&#096;');
    }
