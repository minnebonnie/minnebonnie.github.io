<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#28a745">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="To Do">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="format-detection" content="telephone=no">

<link rel="apple-touch-icon" sizes="180x180" href="/records/todo_list/icon.png">
<link rel="icon" type="image/png" href="/records/todo_list/icon.png">

<title>투두리스트 ✅</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

<style>
:root {
    --primary: #28a745;
    --bg: #f0f2f5;
    --card-bg: #ffffff;
    --someday: #6f42c1;
    --done-blue: #007bff;
    --border: #e6e8ee;
    --text: #333;
    --sub: #999;
}

* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html {
    background: var(--bg);
    min-height: 100%;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background-color: var(--bg);
    margin: 0;
    padding: 14px;
    padding-top: max(14px, env(safe-area-inset-top));
    padding-bottom: max(14px, env(safe-area-inset-bottom));
    color: var(--text);
    min-height: 100vh;
}

button, input {
    font-family: inherit;
}

.dashboard {
    display: grid;
    grid-template-columns: 315px 1fr;
    gap: 18px;
    align-items: start;
    max-width: 1400px;
    margin: 0 auto;
}

.card {
    background: var(--card-bg);
    padding: 18px;
    border-radius: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    margin-bottom: 18px;
}

h2 {
    margin-top: 0;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    color: #444;
    border-bottom: 2px solid #f0f0f0;
    padding-bottom: 13px;
    font-weight: 800;
}

input[type="text"] {
    background: #fff;
    outline: none;
}

.date-controller {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    flex-wrap: wrap;
}

.nav-btn {
    background: #f0f0f0;
    border: none;
    padding: 6px 11px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 0.9rem;
}

.current-date-text {
    color: var(--primary);
    font-weight: 900;
    font-size: 1.1rem;
    min-width: 108px;
    text-align: center;
    letter-spacing: -0.02em;
}

.date-picker-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    cursor: pointer;
}

#datePicker {
    position: absolute;
    opacity: 0;
    width: 28px;
    height: 28px;
    cursor: pointer;
    z-index: 10;
}

.cal-icon {
    font-size: 1.2rem;
}

.today-btn {
    background: var(--primary);
    color: white;
    border: none;
    padding: 6px 11px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 800;
}

.backup-zone {
    display: flex;
    gap: 7px;
    justify-content: center;
    margin-bottom: 18px;
    padding: 9px;
    background: white;
    border-radius: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    flex-wrap: wrap;
}

.backup-btn {
    flex: 1;
    min-width: 81px;
    font-size: 0.75rem;
    padding: 8px 9px;
    border-radius: 10px;
    border: 1px solid #ddd;
    background: white;
    cursor: pointer;
    font-weight: 800;
}

.merge-btn {
    background: #f0edff;
    color: var(--someday);
}

.overwrite-btn {
    background: #fff0f0;
    color: #d94848;
}

.someday-title {
    color: var(--someday) !important;
    border-bottom-color: #f3e5f5 !important;
}

.someday-item {
    display: flex;
    align-items: center;
    padding: 11px 13px;
    background: #fdfbff;
    border: 1px solid #eee;
    border-radius: 12px;
    margin-bottom: 7px;
    cursor: grab;
    font-size: 0.85rem;
    font-weight: 600;
}

.someday-text {
    flex: 1;
}

.someday-order-actions {
    display: none;
}

.order-btn {
    background: #f3efff;
    color: var(--someday);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 900;
}

.order-btn:disabled {
    opacity: 0.25;
    cursor: default;
}

.todo-item {
    display: flex;
    align-items: center;
    padding: 12px 8px;
    border-bottom: 1px solid #f9f9f9;
    font-size: 0.95rem;
}

.todo-text {
    flex: 1;
    margin-left: 12px;
    word-break: break-word;
}

.todo-text.done {
    text-decoration: line-through;
    color: #bbb;
}

.del-btn {
    background: none;
    border: none;
    opacity: 0.35;
    cursor: pointer;
    margin-left: auto;
    font-size: 1rem;
}

.weekly-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 9px;
}

.day-column {
    background: #f9f9f9;
    border-radius: 14px;
    padding: 11px;
    min-height: 162px;
    border: 2px solid transparent;
}

.day-header {
    font-size: 0.8rem;
    font-weight: 900;
    text-align: center;
    margin-bottom: 9px;
    border-bottom: 1px solid #ddd;
    padding-bottom: 5px;
}

.day-header.sun { color: #ff4d4d; }
.day-header.sat { color: #007bff; }

.mini-todo {
    font-size: 0.75rem;
    background: white;
    margin-bottom: 4px;
    padding: 5px 7px;
    border-radius: 6px;
    border-left: 4px solid #ddd;
    font-weight: 600;
    word-break: break-word;
}

.mini-todo.done {
    border-left-color: var(--primary);
    color: #bbb;
    text-decoration: line-through;
}

.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
}

.cal-day {
    background: white;
    border: 1px solid #eee;
    border-radius: 10px;
    min-height: 81px;
    padding: 7px;
}

.cal-num {
    font-size: 0.75rem;
    font-weight: 800;
    margin-bottom: 4px;
    color: #888;
}

.cal-content {
    font-size: 0.65rem;
    color: #d97a7a; /* 톤다운된 빨간색 */
    text-decoration: line-through;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 600;
    margin-bottom: 2px;
}

.cal-content.done {
    text-decoration: none;
    color: #333 !important; /* 검은색 */
    font-weight: 600;
}

.month-label {
    color: var(--primary);
    font-size: 1.1rem;
    font-weight: 900;
    margin-left: 9px;
}



.year-view-btn {
    width: 100%;
    margin-top: 10px;
    background: #eefaf1;
    color: var(--primary);
    border-color: #cdebd5;
}

.year-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 9999;
    padding: 18px;
    overflow: auto;
}

.year-modal.show {
    display: block;
}

.year-panel {
    background: #fff;
    border-radius: 24px;
    max-width: 1600px;
    margin: 0 auto;
    padding: 22px;
    box-shadow: 0 18px 45px rgba(0,0,0,0.18);
}

.year-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 18px;
    border-bottom: 1px solid #eee;
    padding-bottom: 14px;
}

.year-title {
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--primary);
    letter-spacing: -0.03em;
}

.year-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: flex-end;
}

.year-board-wrap {
    width: 100%;
    overflow-x: auto;
    padding-bottom: 8px;
}

.year-board {
    min-width: 1320px;
    display: grid;
    grid-template-columns: repeat(12, minmax(96px, 1fr));
    border: 1px solid #e7e3dc;
    border-radius: 18px;
    overflow: hidden;
    background: #fff;
}

.year-month-title {
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f6f4ef;
    border-bottom: 1px solid #e7e3dc;
    font-size: 0.68rem;
    font-weight: 900;
    color: #555;
    letter-spacing: 0.02em;
    border-right: 1px solid #e7e3dc;
}

.year-month-title:nth-child(12) {
    border-right: none;
}

.year-day-row {
    min-height: 34px;
    border-bottom: 1px solid #efebe5;
    border-right: 1px solid #e7e3dc;
    padding: 3px 4px;
    overflow: hidden;
}

.year-day-row:nth-child(12n) {
    border-right: none;
}

.year-day-row.day-even {
    background: #faf8f4;
}

.year-day-row.day-last {
    border-bottom: none;
}

.year-day-row.empty {
    background: #f7f7f7;
    color: #c8c8c8;
}

.year-day-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 3px;
    margin-bottom: 1px;
}

.year-day-num {
    font-size: 0.58rem;
    font-weight: 900;
    color: #777;
}

.year-weekday-small {
    font-size: 0.48rem;
    font-weight: 800;
    color: #aaa;
    text-transform: lowercase;
}

.year-todo {
    font-size: 0.5rem;
    line-height: 1.25;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 1px;
    color: #d97a7a;
    text-decoration: line-through;
    font-weight: 700;
}

.year-todo.done {
    color: #333;
    text-decoration: none;
}

@media (max-width: 520px) {
    .year-modal {
        padding: 8px;
    }

    .year-panel {
        padding: 14px;
        border-radius: 18px;
    }

    .year-title {
        font-size: 1.2rem;
    }

    .year-board {
        min-width: 1180px;
    }
}

#importMergeFile,
#importOverwriteFile {
    display: none;
}

@media (max-width: 900px) {
    .dashboard {
        grid-template-columns: 1fr;
        max-width: 720px;
    }

    .weekly-grid {
        grid-template-columns: repeat(7, minmax(210px, 72vw));
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        overscroll-behavior-x: contain;
        padding: 2px 2px 10px;
        scrollbar-width: thin;
    }

    .day-column {
        min-height: 120px;
        scroll-snap-align: start;
    }
}

@media (max-width: 520px) {
    body {
        padding: 8px;
        padding-top: max(8px, env(safe-area-inset-top));
        padding-bottom: max(8px, env(safe-area-inset-bottom));
        overflow-x: hidden;
    }

    button,
    input {
        min-height: 44px;
    }

    input[type="text"] {
        min-width: 0;
        font-size: 16px !important;
    }

    .dashboard {
        display: flex;
        flex-direction: column;
        gap: 0;
        width: 100%;
    }

    .left-panel,
    .right-panel {
        display: contents;
    }

    .todo-entry-card { order: 1; }
    .daily-card { order: 2; }
    .weekly-card { order: 3; }
    .monthly-card { order: 4; }
    .backup-zone { order: 5; }
    .someday-card { order: 6; }

    .todo-entry-card,
    .daily-card,
    .weekly-card,
    .monthly-card,
    .someday-card,
    .backup-zone {
        width: 100%;
    }

    .card {
        padding: 14px;
        border-radius: 16px;
        margin-bottom: 10px;
        box-shadow: 0 3px 10px rgba(0,0,0,0.045);
    }

    h2 {
        font-size: 0.98rem;
        padding-bottom: 11px;
        margin-bottom: 12px;
    }

    .entry-row {
        gap: 7px !important;
    }

    .entry-row button {
        flex: 0 0 auto;
        padding: 0 15px !important;
    }

    .date-controller {
        display: grid;
        grid-template-columns: 44px minmax(112px, 1fr) 44px 52px;
        gap: 6px;
    }

    .date-controller .date-picker-wrapper {
        grid-column: 1 / -1;
        grid-row: 2;
        justify-self: center;
        min-height: 32px;
        margin-top: -2px;
    }

    .date-controller .nav-btn,
    .date-controller .today-btn {
        padding: 0;
        width: 100%;
    }

    .date-controller .today-btn {
        grid-column: 4;
        grid-row: 1;
    }

    .current-date-text {
        min-width: 0;
        font-size: 1.05rem;
    }

    #datePicker {
        width: 44px;
        height: 32px;
    }

    .cal-icon {
        font-size: 1.25rem;
    }

    .todo-item {
        min-height: 48px;
        padding: 8px 3px;
        font-size: 0.9rem;
    }

    .todo-item input[type="checkbox"] {
        width: 20px;
        height: 20px;
        min-height: 20px;
        flex: 0 0 auto;
    }

    .todo-text {
        margin-left: 9px;
    }

    .del-btn {
        min-width: 40px;
        min-height: 40px;
        padding: 0;
    }

    .backup-zone {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
        margin-bottom: 10px;
        padding: 8px;
    }

    .backup-btn {
        min-width: 0;
        padding: 7px 4px;
        font-size: 0.7rem;
    }

    .year-view-btn {
        grid-column: 1 / -1;
        margin-top: 0;
    }

    .weekly-grid {
        grid-template-columns: 1fr;
        gap: 8px;
        margin: 0;
        padding: 0;
        overflow-x: visible;
        scroll-snap-type: none;
    }

    .day-column {
        min-height: 88px;
        padding: 10px;
        border-radius: 12px;
        scroll-snap-align: none;
    }

    .day-header {
        font-size: 0.82rem;
    }

    .calendar-grid {
        grid-template-columns: 1fr;
        gap: 7px;
    }

    .cal-day {
        min-width: 0;
        min-height: 58px;
        padding: 9px 10px;
        border-radius: 10px;
    }

    .cal-day.calendar-empty {
        display: none;
    }

    .cal-num {
        margin-bottom: 6px;
        padding-bottom: 5px;
        border-bottom: 1px solid #f0f0f0;
        font-size: 0.8rem;
    }

    .cal-content {
        display: block;
        width: auto;
        height: auto;
        margin: 0 0 4px;
        border-radius: 0;
        background: transparent;
        color: #d97a7a;
        font-size: 0.76rem;
        line-height: 1.4;
        white-space: normal;
        overflow: visible;
        text-overflow: clip;
        word-break: break-word;
        text-decoration: line-through;
    }

    .cal-content.done {
        background: transparent;
        color: #333 !important;
    }

    .month-label {
        font-size: 1rem;
        margin-left: 4px;
    }

    .someday-item {
        min-height: 48px;
        padding: 8px 10px;
        cursor: default;
        gap: 6px;
    }

    .someday-order-actions {
        display: flex;
        gap: 4px;
        margin-left: auto;
    }

    .order-btn {
        width: 36px;
        min-width: 36px;
        min-height: 38px;
        padding: 0;
        font-size: 0.8rem;
    }

    .someday-item .del-btn {
        margin-left: 0;
    }

    .year-modal {
        padding: 0;
        background: #fff;
    }

    .year-panel {
        min-height: 100vh;
        padding: max(10px, env(safe-area-inset-top)) 8px max(10px, env(safe-area-inset-bottom));
        border-radius: 0;
        box-shadow: none;
    }

    .year-header {
        position: sticky;
        top: 0;
        z-index: 5;
        margin: 0 -8px 10px;
        padding: 0 8px 10px;
        background: #fff;
    }

    .year-title {
        font-size: 1.05rem;
        white-space: nowrap;
    }

    .year-actions {
        flex-wrap: nowrap;
    }

    .year-board-wrap {
        -webkit-overflow-scrolling: touch;
        scroll-snap-type: x proximity;
    }

    .year-board {
        min-width: 1080px;
    }
}
</style>
</head>

<body>

<div class="dashboard">
    <div class="left-panel">
        <div class="card todo-entry-card">
            <h2>✍️ 할 일 기록</h2>
            <div class="entry-row" style="display:flex; gap:8px;">
                <input type="text" id="todoInput" style="flex:1; padding:12px; border-radius:12px; border:1px solid #eee; font-size:0.95rem;" placeholder="기록해볼까?">
                <button onclick="addTodo()" style="background:var(--primary); color:white; border:none; border-radius:12px; padding:0 15px; font-weight:bold; cursor:pointer;">추가</button>
            </div>
        </div>

        <div class="card daily-card">
            <div class="date-controller">
                <button class="nav-btn" onclick="changeDate(-1)">◀</button>
                <span id="targetDateText" class="current-date-text"></span>
                <div class="date-picker-wrapper">
                    <span class="cal-icon">📅</span>
                    <input type="date" id="datePicker" onchange="jumpToDate(this.value)">
                </div>
                <button class="nav-btn" onclick="changeDate(1)">▶</button>
                <button class="today-btn" onclick="goToday()">오늘</button>
            </div>
            <div id="dailyList" style="margin-top:15px;"></div>
        </div>

        <div class="backup-zone">
            <button class="backup-btn" onclick="exportData()">💾 백업</button>
            <button class="backup-btn merge-btn" onclick="document.getElementById('importMergeFile').click()">🔀 병합</button>
            <button class="backup-btn overwrite-btn" onclick="document.getElementById('importOverwriteFile').click()">📂 덮어쓰기</button>

            <input type="file" id="importMergeFile" accept=".json" onchange="mergeData(event)">
            <input type="file" id="importOverwriteFile" accept=".json" onchange="overwriteData(event)">
            <button class="backup-btn year-view-btn" onclick="openYearView()">🗓️ 1년 한눈에 보기</button>
        </div>

        <div class="card someday-card">
            <h2 class="someday-title">➡️ 나중에 할 일</h2>
            <div class="entry-row" style="display:flex; gap:5px; margin-bottom:15px;">
                <input type="text" id="somedayInput" style="flex:1; padding:10px; border-radius:10px; border:1px solid #eee; font-size:0.85rem;" placeholder="나중에 처리할 일!">
                <button onclick="addSomeday()" style="background:var(--someday); color:white; border:none; border-radius:10px; padding:0 12px; font-size:0.85rem; cursor:pointer;">등록</button>
            </div>
            <div id="somedayList"></div>
        </div>
    </div>

    <div class="right-panel">
        <div class="card weekly-card">
            <h2>🗓️ 이번 주 대쉬보드</h2>
            <div class="weekly-grid" id="weeklyGrid"></div>
        </div>

        <div class="card monthly-card">
            <h2>🌙 월간 캘린더 <span id="calendarMonthLabel" class="month-label"></span></h2>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>
    </div>
</div>


<div id="yearModal" class="year-modal">
    <div class="year-panel">
        <div class="year-header">
            <button class="nav-btn" onclick="changeYearView(-1)">◀</button>
            <div id="yearViewTitle" class="year-title"></div>
            <div class="year-actions">
                <button class="nav-btn" onclick="changeYearView(1)">▶</button>
                <button class="today-btn" onclick="closeYearView()">닫기</button>
            </div>
        </div>
        <div id="yearGrid" class="year-grid"></div>
    </div>
</div>

<script>
let todos = JSON.parse(localStorage.getItem('todoRecords') || '[]');
let somedayList = JSON.parse(localStorage.getItem('somedayRecords') || '[]');
let viewDate = new Date();
let yearViewDate = new Date();

const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

window.onload = () => {
    normalizeData();
    renderAll();
    initSortable();

    document.getElementById('todoInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') addTodo();
    });

    document.getElementById('somedayInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') addSomeday();
    });
};

function save() {
    localStorage.setItem('todoRecords', JSON.stringify(todos));
    localStorage.setItem('somedayRecords', JSON.stringify(somedayList));
}

function normalizeData() {
    todos = todos.map(t => ({
        id: t.id || Date.now() + Math.random(),
        text: t.text || '',
        completed: Boolean(t.completed),
        dateString: t.dateString || new Date(t.timestamp || Date.now()).toDateString(),
        timestamp: t.timestamp || new Date(t.dateString || Date.now()).getTime()
    }));

    somedayList = somedayList.map(s => ({
        id: s.id || Date.now() + Math.random(),
        text: s.text || ''
    }));

    save();
}

function initSortable() {
    const el = document.getElementById('somedayList');
    if (!el || !window.Sortable || window.matchMedia('(max-width: 520px)').matches) return;

    Sortable.create(el, {
        animation: 150,
        onEnd: function() {
            const newOrder = [];
            document.querySelectorAll('.someday-item').forEach(item => {
                const id = Number(item.getAttribute('data-id'));
                const found = somedayList.find(s => Number(s.id) === id);
                if (found) newOrder.push(found);
            });
            somedayList = newOrder;
            save();
        }
    });
}

function addSomeday() {
    const input = document.getElementById('somedayInput');
    const text = input.value.trim();
    if (!text) return;

    somedayList.push({
        id: Date.now(),
        text
    });

    save();
    input.value = '';
    renderSomeday();
}

function deleteSomeday(id) {
    somedayList = somedayList.filter(s => s.id !== id);
    save();
    renderSomeday();
}

function moveSomeday(id, direction) {
    const currentIndex = somedayList.findIndex(s => Number(s.id) === Number(id));
    const nextIndex = currentIndex + direction;

    if (currentIndex < 0 || nextIndex < 0 || nextIndex >= somedayList.length) return;

    [somedayList[currentIndex], somedayList[nextIndex]] =
        [somedayList[nextIndex], somedayList[currentIndex]];

    save();
    renderSomeday();
}

function renderSomeday() {
    const list = document.getElementById('somedayList');

    list.innerHTML = somedayList.map((s, index) => `
        <div class="someday-item" data-id="${s.id}">
            <span class="someday-text">${escapeHtml(s.text)}</span>
            <div class="someday-order-actions">
                <button class="order-btn" onclick="moveSomeday(${s.id}, -1)" ${index === 0 ? 'disabled' : ''} aria-label="위로 이동">▲</button>
                <button class="order-btn" onclick="moveSomeday(${s.id}, 1)" ${index === somedayList.length - 1 ? 'disabled' : ''} aria-label="아래로 이동">▼</button>
            </div>
            <button class="del-btn" onclick="deleteSomeday(${s.id})">🗑️</button>
        </div>
    `).join('') || '<div style="text-align:center; color:#ccc; font-size:0.75rem;">나중에 할 일을 적어봐!</div>';
}

function exportData() {
    const data = {
        app: 'Todo List',
        version: 2,
        exportedAt: new Date().toISOString(),
        todos,
        somedayList
    };

    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement('a');
    a.href = url;
    a.download = `투두리스트 백업.json`;
    a.click();

    URL.revokeObjectURL(url);
}

function getImportedData(parsed) {
    if (!parsed) return null;

    return {
        todos: Array.isArray(parsed.todos) ? parsed.todos : [],
        somedayList: Array.isArray(parsed.somedayList) ? parsed.somedayList : []
    };
}

function normalizeImportedData(data) {
    const importedTodos = data.todos.map(t => ({
        id: t.id || Date.now() + Math.random(),
        text: t.text || '',
        completed: Boolean(t.completed),
        dateString: t.dateString || new Date(t.timestamp || Date.now()).toDateString(),
        timestamp: t.timestamp || new Date(t.dateString || Date.now()).getTime()
    }));

    const importedSomeday = data.somedayList.map(s => ({
        id: s.id || Date.now() + Math.random(),
        text: s.text || ''
    }));

    return {
        todos: importedTodos,
        somedayList: importedSomeday
    };
}

function makeTodoKey(todo) {
    return `${String(todo.text || '').trim().toLowerCase()}::${todo.dateString || ''}`;
}

function makeSomedayKey(item) {
    return String(item.text || '').trim().toLowerCase();
}

function mergeData(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = e => {
        try {
            const parsed = JSON.parse(e.target.result);
            const raw = getImportedData(parsed);

            if (!raw) {
                alert("병합할 수 있는 백업 파일이 아니야 ㅠㅠ");
                return;
            }

            if (!confirm("현재 기록은 유지하고, 이 백업 파일의 투두를 합칠까?")) return;

            const imported = normalizeImportedData(raw);

            let addedTodos = 0;
            let mergedTodos = 0;
            const todoMap = new Map();

            todos.forEach(t => {
                todoMap.set(makeTodoKey(t), t);
            });

            imported.todos.forEach(incoming => {
                const key = makeTodoKey(incoming);
                const existing = todoMap.get(key);

                if (existing) {
                    todoMap.set(key, {
                        ...existing,
                        completed: Boolean(existing.completed || incoming.completed),
                        timestamp: Math.min(Number(existing.timestamp || Date.now()), Number(incoming.timestamp || Date.now())),
                        dateString: existing.dateString || incoming.dateString
                    });
                    mergedTodos++;
                } else {
                    todoMap.set(key, incoming);
                    addedTodos++;
                }
            });

            let addedSomeday = 0;
            let mergedSomeday = 0;
            const somedayMap = new Map();

            somedayList.forEach(s => {
                somedayMap.set(makeSomedayKey(s), s);
            });

            imported.somedayList.forEach(incoming => {
                const key = makeSomedayKey(incoming);

                if (somedayMap.has(key)) {
                    mergedSomeday++;
                } else {
                    somedayMap.set(key, incoming);
                    addedSomeday++;
                }
            });

            todos = Array.from(todoMap.values()).sort((a, b) => Number(b.timestamp || b.id) - Number(a.timestamp || a.id));
            somedayList = Array.from(somedayMap.values());

            save();
            renderAll();

            alert(`병합 완료! 할 일 ${addedTodos}개, 나중에 할 일 ${addedSomeday}개 추가했어.`);
        } catch (err) {
            alert("파일을 병합하는 중 문제가 생겼어 ㅠㅠ");
        }

        event.target.value = '';
    };

    reader.readAsText(file);
}

function overwriteData(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = e => {
        try {
            const parsed = JSON.parse(e.target.result);
            const raw = getImportedData(parsed);

            if (!raw) {
                alert("불러올 수 있는 백업 파일이 아니야 ㅠㅠ");
                return;
            }

            if (!confirm("덮어쓰면 현재 투두가 백업 파일 내용으로 교체돼. 계속할까?")) return;

            const imported = normalizeImportedData(raw);

            todos = imported.todos;
            somedayList = imported.somedayList;

            save();
            renderAll();

            alert("덮어쓰기 완료!");
        } catch (err) {
            alert("파일 확인해줘 ㅠㅠ");
        }

        event.target.value = '';
    };

    reader.readAsText(file);
}

function jumpToDate(dateVal) {
    if (!dateVal) return;
    viewDate = new Date(dateVal + 'T00:00:00');
    renderAll();
}

function changeDate(step) {
    viewDate.setDate(viewDate.getDate() + step);
    renderAll();
}

function goToday() {
    viewDate = new Date();
    renderAll();
}

function addTodo() {
    const input = document.getElementById('todoInput');
    const text = input.value.trim();
    if (!text) return;

    const date = new Date(viewDate);

    todos.unshift({
        id: Date.now(),
        text,
        completed: false,
        dateString: date.toDateString(),
        timestamp: date.getTime()
    });

    save();
    input.value = '';
    renderAll();
}

function toggleTodo(id) {
    todos = todos.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
    save();
    renderAll();
}

function deleteTodo(id) {
    if (!confirm("삭제할까?")) return;
    todos = todos.filter(t => t.id !== id);
    save();
    renderAll();
}

function renderAll() {
    document.getElementById('targetDateText').innerText = `${viewDate.getFullYear()}.${viewDate.getMonth()+1}.${viewDate.getDate()}`;
    document.getElementById('calendarMonthLabel').innerText = `${monthNames[viewDate.getMonth()]}, ${viewDate.getFullYear()}`;

    const dailyList = document.getElementById('dailyList');
    const daily = todos.filter(t => t.dateString === viewDate.toDateString());

    dailyList.innerHTML = daily.map(t => `
        <div class="todo-item">
            <input type="checkbox" ${t.completed ? 'checked' : ''} onclick="toggleTodo(${t.id})">
            <span class="todo-text ${t.completed ? 'done' : ''}">${escapeHtml(t.text)}</span>
            <button class="del-btn" onclick="deleteTodo(${t.id})">🗑️</button>
        </div>
    `).join('') || '<div style="text-align:center; color:#ccc; font-size:0.8rem; padding:10px;">기록 없음</div>';

    renderSomeday();

    const weeklyGrid = document.getElementById('weeklyGrid');
    weeklyGrid.innerHTML = '';

    const sun = new Date(viewDate);
    sun.setDate(viewDate.getDate() - viewDate.getDay());

    for (let i = 0; i < 7; i++) {
        const tempD = new Date(sun);
        tempD.setDate(sun.getDate() + i);

        const dayTodos = todos.filter(t => t.dateString === tempD.toDateString());
        const isSelected = tempD.toDateString() === viewDate.toDateString();

        weeklyGrid.innerHTML += `
            <div class="day-column" style="${isSelected ? 'border-color:var(--primary); background:#fff;' : ''}">
                <div class="day-header ${i === 0 ? 'sun' : i === 6 ? 'sat' : ''}">${dayNames[i]} (${tempD.getDate()})</div>
                ${dayTodos.map(t => `<div class="mini-todo ${t.completed ? 'done' : ''}">${escapeHtml(t.text)}</div>`).join('')}
            </div>
        `;
    }

    const calendarGrid = document.getElementById('calendarGrid');
    calendarGrid.innerHTML = '';

    const firstDay = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1);
    const lastDay = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0);

    for (let i = 0; i < firstDay.getDay(); i++) {
        calendarGrid.innerHTML += `<div class="cal-day calendar-empty" style="background:#f0f2f5; border:none;"></div>`;
    }

    for (let i = 1; i <= lastDay.getDate(); i++) {
        const tempD = new Date(viewDate.getFullYear(), viewDate.getMonth(), i);
        const dayTodos = todos.filter(t => t.dateString === tempD.toDateString());
        const isSelected = tempD.toDateString() === viewDate.toDateString();

        calendarGrid.innerHTML += `
            <div class="cal-day" style="${isSelected ? 'background:#e8f5e9; border-color:var(--primary);' : ''}">
                <div class="cal-num">${i}</div>
                ${dayTodos.map(t => `<div class="cal-content ${t.completed ? 'done' : ''}">• ${escapeHtml(t.text)}</div>`).join('')}
            </div>
        `;
    }
}


function openYearView() {
    yearViewDate = new Date(viewDate);
    document.getElementById('yearModal').classList.add('show');
    renderYearView();
}

function closeYearView() {
    document.getElementById('yearModal').classList.remove('show');
}

function changeYearView(step) {
    yearViewDate.setFullYear(yearViewDate.getFullYear() + step);
    renderYearView();
}

function renderYearView() {
    const year = yearViewDate.getFullYear();
    document.getElementById('yearViewTitle').innerText = `${year}년 전체 보기`;

    const yearGrid = document.getElementById('yearGrid');
    yearGrid.innerHTML = '';
    yearGrid.className = 'year-board-wrap';

    const weekdayNames = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];
    let boardHtml = `<div class="year-board">`;

    for (let month = 0; month < 12; month++) {
        boardHtml += `<div class="year-month-title">${monthNames[month].toUpperCase()}</div>`;
    }

    for (let day = 1; day <= 31; day++) {
        for (let month = 0; month < 12; month++) {
            const lastDay = new Date(year, month + 1, 0).getDate();
            const rowClasses = [
                'year-day-row',
                day % 2 === 0 ? 'day-even' : '',
                day === 31 ? 'day-last' : ''
            ].filter(Boolean).join(' ');

            if (day > lastDay) {
                boardHtml += `<div class="${rowClasses} empty"></div>`;
                continue;
            }

            const tempD = new Date(year, month, day);
            const dayTodos = todos.filter(t => t.dateString === tempD.toDateString());
            const weekday = weekdayNames[tempD.getDay()];

            boardHtml += `
                <div class="${rowClasses}">
                    <div class="year-day-head">
                        <span class="year-day-num">${day}</span>
                        <span class="year-weekday-small">${weekday}</span>
                    </div>
                    ${dayTodos.map(t => `<div class="year-todo ${t.completed ? 'done' : ''}">${escapeHtml(t.text)}</div>`).join('')}
                </div>
            `;
        }
    }

    boardHtml += `</div>`;
    yearGrid.innerHTML = boardHtml;
}

function escapeHtml(text) {
    return String(text || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
}
